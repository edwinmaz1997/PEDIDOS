<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4A90D9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NuevaExpress">
<link rel="apple-touch-icon" href="/assets/img/logo.jpg">
<link rel="icon" type="image/jpeg" href="/assets/img/logo.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NuevaExpress — Directorio de Negocios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="logo"><img src="assets/img/logo.jpg" alt="NuevaExpress" style="height:38px;border-radius:8px"><span class="logo-text">Nueva<span>Express</span></span></a>
    <div class="nav-right">
      <a href="cliente/login.html" class="btn-ghost">Ingresar</a>
      <a href="cliente/register.html" class="btn-primary">Registrarse</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Encuentra negocios<br><span class="accent" id="typedText"></span><span id="typedCursor" style="color:var(--gold);animation:blink .7s infinite">|</span></h1>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Busca restaurantes, ceviches, farmacias..." autocomplete="off">
      <button onclick="doSearch()" class="btn-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
    <button onclick="openBusiness(5)" class="btn-primary" style="display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:12px 28px;font-size:1rem">
      🛵 Pedir ahora
    </button>
  </div>
  <div class="hero-bg"></div>
</section>

<!-- CATEGORIES -->
<section class="categories-section">
  <h2 style="text-align:center;font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:16px;color:var(--navy)">Categorías</h2>
  <div class="cat-carousel" style="max-width:1200px;margin:0 auto;padding:0 16px">
    <button class="cat-arrow left" id="catPrev" onclick="scrollCats(-1)">‹</button>
    <div class="categories-track" id="categoriesTrack"></div>
    <button class="cat-arrow right" id="catNext" onclick="scrollCats(1)">›</button>
  </div>
</section>

<!-- BUSINESSES CAROUSEL BY CATEGORY -->
<div id="businessSections"></div>

<!-- CATEGORY FILTER RESULTS -->
<section class="hidden" id="categoryResults" style="padding:24px 0"></section>

<!-- SEARCH RESULTS -->
<section class="search-results hidden" id="searchResults">
  <div class="container">
    <h2 class="section-title" id="searchTitle">Resultados</h2>
    <div class="businesses-grid" id="resultsGrid"></div>
  </div>
</section>

<!-- MODAL: Business Detail -->
<div class="modal-overlay hidden" id="businessModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="logo" style="justify-content:center"><img src="assets/img/logo.jpg" alt="NuevaExpress" style="height:36px;border-radius:8px"><span class="logo-text">Nueva<span>Express</span></span></div>
    <div style="display:flex;justify-content:center;gap:20px;margin:16px 0;flex-wrap:wrap">
      <a href="/nosotros.html" style="color:rgba(255,255,255,.6);text-decoration:none;font-size:.88rem;transition:.2s" onmouseover="this.style.color='#F5C518'" onmouseout="this.style.color='rgba(255,255,255,.6)'">Sobre nosotros</a>
      <a href="/terminos.html" style="color:rgba(255,255,255,.6);text-decoration:none;font-size:.88rem;transition:.2s" onmouseover="this.style.color='#F5C518'" onmouseout="this.style.color='rgba(255,255,255,.6)'">Términos y condiciones</a>
      <a href="https://wa.me/50231586340?text=Hola%2C+necesito+m%C3%A1s+informaci%C3%B3n+sobre+NuevaExpress" target="_blank" style="display:flex;align-items:center;gap:6px;color:#25d366;text-decoration:none;font-size:.88rem;font-weight:600">💬 WhatsApp</a>
      <a href="https://www.facebook.com/NuevaExpressGT" target="_blank" style="display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.6);text-decoration:none;font-size:.88rem;transition:.2s" onmouseover="this.style.color='#F5C518'" onmouseout="this.style.color='rgba(255,255,255,.6)'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Facebook
      </a>
    </div>
    <p>© <span id="yr"></span> NuevaExpress. Todos los derechos reservados.</p>
  </div>
</footer>

<script>
const API = '/api';

// ─── State ───────────────────────────────────────────────
let categories = [];
let activeCategory = null;

// ─── Init ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  // Update navbar based on auth state
  var token = localStorage.getItem('nuevaexpress_token');
  var user  = JSON.parse(localStorage.getItem('nuevaexpress_user') || '{}');
  var navRight = document.getElementById('navRight');
  if (token && user.name && navRight) {
    var role  = user.role || 'cliente';
    var panel = role === 'admin' ? '/admin/index.html' : (role === 'negocio' ? '/negocio/index.html' : (role === 'repartidor' ? '/repartidor/index.html' : '/cliente/index.html'));
    navRight.innerHTML =
      '<a href="' + panel + '" class="btn-ghost" style="padding:7px 14px;font-size:.82rem">👤 ' + user.name.split(' ')[0] + '</a>' +
      '<a href="' + panel + '" class="btn-primary" style="padding:7px 14px;font-size:.82rem">Mi panel</a>';
  }
  await loadCategories();
  await filterCategory(null, document.querySelector('.cat-chip.active'));
});

// ─── Load Categories ──────────────────────────────────────
async function loadCategories() {
  try {
    const res = await fetch(`${API}/categories`);
    const data = await res.json();
    categories = data.data || [];
    renderCategories();
  } catch(e) { console.error(e); }
}

function renderCategories() {
  const icons = { utensils:'🍴', pills:'💊', 'shopping-cart':'🛒', wrench:'🔧', shirt:'👕', laptop:'💻', heart:'💅', store:'🏪' };
  const track = document.getElementById('categoriesTrack');
  track.innerHTML = `
    <button class="cat-chip active" onclick="filterCategory(null, this)">Todos</button>
    ${categories.map(c => `
      <button class="cat-chip" onclick="filterCategory(${c.id}, this)" style="--cat-color:${c.color}">
        <span>${icons[c.icon] || '🏪'}</span> ${escHtml(c.name)}
      </button>
    `).join('')}
  `;
  // Iniciar carrusel después de renderizar
  clearInterval(_catTimer);
  setTimeout(initCatCarousel, 300);
}

// ─── Filter by category ───────────────────────────────────
async function filterCategory(id, btn) {
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  activeCategory = id;
  document.getElementById('searchResults').classList.add('hidden');

  if (!id) {
    // Todos — carrusel con todos los negocios
    document.getElementById('businessSections').classList.remove('hidden');
    document.getElementById('categoryResults').classList.add('hidden');
    document.getElementById('businessSections').innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
    try {
      const res  = await fetch(`${API}/businesses?limit=100`);
      const data = await res.json();
      const all  = data.data?.businesses || [];
      if (!all.length) {
        document.getElementById('businessSections').innerHTML = '<div class="empty-state"><p>No hay negocios registrados aún.</p></div>';
        return;
      }
      document.getElementById('businessSections').innerHTML = `
        <section class="biz-section">
          <div class="container">
            <div class="section-header">
              <h2 class="section-title">Todos los negocios</h2>
              <span style="font-size:.85rem;color:var(--muted)">${all.length} negocio${all.length!==1?'s':''}</span>
            </div>
            <div class="carousel-wrapper">
              <button class="carousel-btn prev" onclick="slideCarousel('all', -1)">‹</button>
              <div class="carousel-track" id="carousel-all">
                ${all.map(b => renderCard(b)).join('')}
              </div>
              <button class="carousel-btn next" onclick="slideCarousel('all', 1)">›</button>
            </div>
          </div>
        </section>`;
    } catch(e) {
      document.getElementById('businessSections').innerHTML = '<div class="empty-state"><p>Error cargando negocios.</p></div>';
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // Filtrar por categoría — fetch dedicado
  document.getElementById('businessSections').classList.add('hidden');
  const catResults = document.getElementById('categoryResults');
  catResults.classList.remove('hidden');
  catResults.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';

  try {
    const res  = await fetch(`${API}/businesses/by-category/${id}`);
    const data = await res.json();
    const businesses = Array.isArray(data.data) ? data.data : (data.data?.businesses || []);

    if (!businesses.length) {
      catResults.innerHTML = '<div class="empty-state"><p>No hay negocios en esta categoría aún.</p></div>';
      return;
    }

    catResults.innerHTML = `
      <div class="container">
        <div style="margin-bottom:16px;font-size:.9rem;color:var(--muted)">${businesses.length} negocio${businesses.length!==1?'s':''} encontrado${businesses.length!==1?'s':''}</div>
        <div class="businesses-grid">
          ${businesses.map(b => renderCard(b)).join('')}
        </div>
      </div>`;
  } catch(e) {
    catResults.innerHTML = '<div class="empty-state"><p>Error cargando negocios.</p></div>';
  }
}

// ─── Load All Sections (carousel per category) ────────────
async function loadAllSections() {
  const container = document.getElementById('businessSections');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
  try {
    const res = await fetch(`${API}/businesses?limit=50`);
    const data = await res.json();
    const businesses = data.data?.businesses || [];

    // Group by category
    const grouped = {};
    businesses.forEach(b => {
      const key = b.category_id;
      if (!grouped[key]) grouped[key] = { name: b.category_name, icon: b.category_icon, color: b.category_color, items: [] };
      grouped[key].items.push(b);
    });

    if (Object.keys(grouped).length === 0) {
      container.innerHTML = '<div class="empty-state"><p>No hay negocios registrados aún.</p></div>';
      return;
    }

    container.innerHTML = Object.entries(grouped).map(([catId, group]) => `
      <section class="biz-section" id="cat-section-${catId}">
        <div class="container">
          <div class="section-header">
            <h2 class="section-title">${escHtml(group.name)}</h2>
            <span class="see-all" onclick="filterCategory(${catId}, document.querySelector('[onclick*=\\'filterCategory(${catId}\\']'))">Ver todos →</span>
          </div>
          <div class="carousel-wrapper">
            <button class="carousel-btn prev" onclick="slideCarousel('${catId}', -1)">‹</button>
            <div class="carousel-track" id="carousel-${catId}">
              ${group.items.map(b => renderCard(b)).join('')}
            </div>
            <button class="carousel-btn next" onclick="slideCarousel('${catId}', 1)">›</button>
          </div>
        </div>
      </section>
    `).join('');
  } catch(e) {
    container.innerHTML = '<div class="empty-state"><p>Error cargando negocios.</p></div>';
    console.error(e);
  }
}

// ─── Carousel ─────────────────────────────────────────────
function slideCarousel(catId, dir) {
  const track = document.getElementById(`carousel-${catId}`);
  const cardW = track.querySelector('.biz-card')?.offsetWidth + 24 || 320;
  track.scrollBy({ left: dir * cardW * 2, behavior: 'smooth' });
}

// ─── Render Card ──────────────────────────────────────────
function renderCard(b) {
  const photo = b.photos?.[0]?.photo_url || b.cover_photo || 'assets/img/placeholder.svg';
  const products = (b.products_preview || []).slice(0,3).map(p => `<span class="tag">${escHtml(p.name)}</span>`).join('');
  return `
    <article class="biz-card" onclick="openBusiness(${b.id})">
      <div class="card-photo" style="background-image:url('${escHtml(photo)}')">
        <span class="card-badge" style="background:${escHtml(b.category_color || '#888')}">${escHtml(b.category_name || '')}</span>
        ${b.business_type === 'delivery' ? '<span class="card-delivery" style="background:#FF8C42">🛵 Solo Delivery</span>' : b.accepts_delivery ? '<span class="card-delivery">🛵 Delivery</span>' : ''}
      </div>
      <div class="card-body">
        <h3>${escHtml(b.name)}</h3>
        <p class="card-desc">${escHtml((b.description || '').slice(0,80))}${b.description?.length > 80 ? '...' : ''}</p>
        <div class="card-tags">${products}</div>
        <div class="card-footer">
          ${b.rating > 0 ? `<span class="rating">★ ${parseFloat(b.rating).toFixed(1)}</span>` : ''}
          ${b.zone ? `<span class="zone">📍 ${escHtml(b.zone)}</span>` : ''}
        </div>
      </div>
    </article>
  `;
}

// ─── Search ───────────────────────────────────────────────
let searchTimeout;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { if (e.target.value.trim()) doSearch(); else showAll(); }, 400);
});

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return showAll();
  try {
    const res = await fetch(`${API}/businesses/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    const results = data.data || [];
    document.getElementById('businessSections').classList.add('hidden');
    const sr = document.getElementById('searchResults');
    sr.classList.remove('hidden');
    document.getElementById('searchTitle').textContent = `${results.length} resultado${results.length !== 1 ? 's' : ''} para "${q}"`;
    document.getElementById('resultsGrid').innerHTML = results.length
      ? results.map(b => renderCard(b)).join('')
      : '<div class="empty-state"><p>Sin resultados. Intenta con otro término.</p></div>';
  } catch(e) { console.error(e); }
}

function showAll() {
  document.getElementById('searchResults').classList.add('hidden');
  document.getElementById('businessSections').classList.remove('hidden');
}

// ─── Business Modal ───────────────────────────────────────
async function openBusiness(id) {
  const modal = document.getElementById('businessModal');
  const content = document.getElementById('modalContent');
  modal.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  content.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';

  try {
    const res = await fetch(`${API}/businesses/${id}`);
    const data = await res.json();
    const b = data.data;
    const photos = b.photos || [];
    const products = b.products || [];

    content.innerHTML = `
      <div class="modal-photos">
        ${photos.length ? `<div class="photos-scroll">${photos.map(p => `<img src="${escHtml(p.photo_url)}" alt="">`).join('')}</div>` : `<div class="modal-cover" style="background:linear-gradient(135deg,#1a1a2e,#16213e)"><span class="modal-logo-text">${escHtml(b.name)}</span></div>`}
      </div>
      <div class="modal-info">
        <div class="modal-header">
          <div>
            <span class="modal-cat-badge">${escHtml(b.category_name)}</span>
            <h2>${escHtml(b.name)}</h2>
          </div>
          <div class="modal-actions-top">
            ${b.business_type === 'servicios' && b.phone ? `<a href="tel:${escHtml(b.phone)}" class="btn-action call">📞 Llamar</a>` : ''}
            ${b.business_type === 'servicios' && b.whatsapp ? `<a href="https://wa.me/${escHtml(b.whatsapp.replace(/\D/g,''))}" target="_blank" class="btn-action whatsapp">💬 WhatsApp</a>` : ''}
          </div>
        </div>
        ${b.description ? `<p class="modal-desc">${escHtml(b.description)}</p>` : ''}
        ${b.what_we_offer ? `<div class="modal-section"><h4>¿Qué ofrecemos?</h4><p>${escHtml(b.what_we_offer)}</p></div>` : ''}
        <div class="modal-meta">
          ${b.address ? `<div class="meta-item">📍 <span>${escHtml(b.address)}${b.zone ? ', ' + escHtml(b.zone) : ''}</span></div>` : ''}
          ${b.business_type === 'servicios' && b.phone ? `<div class="meta-item">📞 <a href="tel:${escHtml(b.phone)}">${escHtml(b.phone)}</a></div>` : ''}
          ${b.email ? `<div class="meta-item">✉️ <a href="mailto:${escHtml(b.email)}">${escHtml(b.email)}</a></div>` : ''}
        ${b.accepts_delivery && b.business_type !== 'servicios' ? `<div class="meta-item">🛵 <span>Delivery disponible</span></div>` : ''}
        </div>
        ${b.latitude && b.longitude ? `
          <a href="https://www.google.com/maps?q=${b.latitude},${b.longitude}" target="_blank" class="btn-maps">
            🗺️ Ver en Google Maps
          </a>` : b.google_maps_url ? `<a href="${escHtml(b.google_maps_url)}" target="_blank" class="btn-maps">🗺️ Ver en Google Maps</a>` : ''}
        ${b.business_type === 'servicios' ? `
          <div class="modal-section" id="servicesSection">
            <h4>🔧 Servicios que ofrecemos</h4>
            <div id="servicesList"><div class="loading-state" style="padding:20px"><div class="spinner"></div></div></div>
          </div>
          <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap">
            ${b.phone ? `<a href="tel:${escHtml(b.phone)}" class="btn-order" style="flex:1;text-align:center;text-decoration:none">📞 Llamar ahora</a>` : ''}
            ${b.whatsapp ? `<a href="https://wa.me/${escHtml(b.whatsapp.replace(/\D/g,''))}?text=${encodeURIComponent('Hola, encontré tus servicios en NuevaExpress y me gustaría más información.')}" target="_blank" class="btn-order" style="flex:1;text-align:center;text-decoration:none;background:#25d366">💬 WhatsApp</a>` : ''}
          </div>
        ` : `
          ${products.length ? `
            <div class="modal-section">
              <h4>Productos / Servicios</h4>
              <div class="products-grid">
                ${products.map(p => `
                  <div class="product-card">
                    ${p.photo ? `<img src="${escHtml(p.photo)}" alt="">` : ''}
                    <div class="product-info">
                      <span class="product-name">${escHtml(p.name)}</span>
                      ${p.price ? `<span class="product-price">Q${parseFloat(p.price).toFixed(2)}</span>` : ''}
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          ` : ''}
          ${b.business_type === 'delivery' ? `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px">
              <a href="cliente/pedido.html?business=${b.id}&type=pedido" class="btn-order" style="text-align:center;text-decoration:none;background:var(--accent)">
                🛒 Hacer Pedido
              </a>
              <a href="cliente/pedido.html?business=${b.id}&type=paquete" class="btn-order" style="text-align:center;text-decoration:none;background:#FF8C42">
                📦 Enviar Paquete
              </a>
            </div>
          ` : `
          <a href="cliente/pedido.html?business=${b.id}" class="btn-order">
            🛒 Hacer un Pedido
          </a>
          `}
        `}
      </div>
    `;
  } catch(e) {
    content.innerHTML = '<div class="empty-state"><p>Error cargando negocio.</p></div>';
  }

  // Si es negocio de servicios, cargar sus servicios
  try {
    const b = (await (await fetch(`${API}/businesses/${id}`)).json()).data;
    if (b && b.business_type === 'servicios') {
      const sRes  = await fetch(`${API}/businesses/${id}/services`);
      const sData = await sRes.json();
      const svcs  = (sData.data || []).filter(s => s.is_available);
      const el = document.getElementById('servicesList');
      if (!el) return;
      if (!svcs.length) { el.innerHTML = '<p style="color:var(--muted);font-size:.9rem">Servicios disponibles — contáctanos para más info</p>'; return; }
      el.innerHTML = svcs.map(s => {
        var price = '';
        if (s.price_from && s.price_to) price = `<span style="color:var(--accent);font-weight:700;font-size:.85rem">Q${parseFloat(s.price_from).toFixed(0)} – Q${parseFloat(s.price_to).toFixed(0)}</span>`;
        else if (s.price_from) price = `<span style="color:var(--accent);font-weight:700;font-size:.85rem">Desde Q${parseFloat(s.price_from).toFixed(0)}</span>`;
        return `<div style="padding:12px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div>
              <div style="font-weight:600">${escHtml(s.name)}</div>
              ${s.description ? `<div style="font-size:.82rem;color:var(--muted);margin-top:2px">${escHtml(s.description)}</div>` : ''}
            </div>
            ${price}
          </div>
        </div>`;
      }).join('');
    }
  } catch(e) {}
}

function closeModal() {
  document.getElementById('businessModal').classList.add('hidden');
  document.body.style.overflow = '';
}
document.getElementById('businessModal').addEventListener('click', (e) => {
  if (e.target.id === 'businessModal') closeModal();
});

// ─── Utils ────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
<script>
var e=document.getElementById("yr");if(e)e.textContent=new Date().getFullYear();

function scrollCats(dir) {
  var track = document.getElementById('categoriesTrack');
  if (track) track.scrollBy({ left: dir * 200, behavior: 'smooth' });
}

var _catTimer = null;
function initCatCarousel() {
  var t = document.getElementById('categoriesTrack');
  if (!t) return;
  clearInterval(_catTimer);
  var resetting = false;

  function step() {
    if (resetting) return;
    var max = t.scrollWidth - t.clientWidth;
    if (max <= 0) return;
    if (t.scrollLeft >= max - 1) {
      resetting = true;
      t.scrollLeft = 0;
      setTimeout(function(){ resetting = false; }, 800);
    } else {
      t.scrollLeft += 1;
    }
  }

  _catTimer = setInterval(step, 20);
  t.addEventListener('mouseenter', function(){ clearInterval(_catTimer); });
  t.addEventListener('mouseleave', function(){ _catTimer = setInterval(step, 20); });
  t.addEventListener('touchstart', function(){ clearInterval(_catTimer); }, {passive:true});
  t.addEventListener('touchend', function(){ setTimeout(function(){ _catTimer = setInterval(step, 20); }, 2500); }, {passive:true});
}
setTimeout(initCatCarousel, 1500);
(function(){
  var phrases=["cerca de ti","en tu bolsillo","a tu puerta","en minutos"];
  var el=document.getElementById("typedText");
  var pi=0,ci=0,deleting=false;
  if(!el)return;
  function type(){
    var phrase=phrases[pi];
    if(!deleting){
      el.textContent=phrase.slice(0,++ci);
      if(ci===phrase.length){deleting=true;setTimeout(type,1800);return;}
      setTimeout(type,80);
    } else {
      el.textContent=phrase.slice(0,--ci);
      if(ci===0){deleting=false;pi=(pi+1)%phrases.length;setTimeout(type,400);return;}
      setTimeout(type,45);
    }
  }
  setTimeout(type,600);
})();
</script>
