<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4A90D9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NuevaExpress">
<link rel="apple-touch-icon" href="/assets/img/logo.jpg">
<link rel="icon" type="image/jpeg" href="/assets/img/logo.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Productos — NuevaExpress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/main.css">
<style>
.products-table-wrap { background:white; border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; }
.prod-row { display:grid; grid-template-columns:56px 1fr auto 120px; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border); }
.prod-row:last-child { border-bottom:none; }
.prod-row:hover { background:var(--off-white); }
.prod-thumb { width:56px; height:56px; border-radius:8px; object-fit:cover; background:var(--off-white); display:flex; align-items:center; justify-content:center; font-size:1.3rem; overflow:hidden; }
.prod-thumb img { width:100%; height:100%; object-fit:cover; }
.prod-name { font-weight:600; font-size:.95rem; }
.prod-desc { font-size:.8rem; color:var(--muted); margin-top:2px; }
.prod-price { font-weight:700; color:var(--accent); white-space:nowrap; }
.prod-actions { display:flex; gap:6px; align-items:center; justify-content:flex-end; }
.icon-btn { background:none; border:1px solid var(--border); border-radius:6px; padding:6px 10px; cursor:pointer; font-size:.85rem; transition:var(--transition); }
.icon-btn:hover { background:var(--off-white); }
.icon-btn.danger:hover { background:#fdf0f0; border-color:var(--danger); color:var(--danger); }
.modal-form { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:flex; align-items:flex-end; justify-content:center; }
@media(min-width:640px){ .modal-form { align-items:center; } }
.modal-form-box { background:white; border-radius:20px 20px 0 0; padding:28px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto; }
@media(min-width:640px){ .modal-form-box { border-radius:20px; } }
.toggle-available { display:flex; align-items:center; gap:10px; }
.switch { position:relative; width:44px; height:24px; }
.switch input { opacity:0; width:0; height:0; }
.slider { position:absolute; inset:0; background:var(--border); border-radius:24px; cursor:pointer; transition:.3s; }
.slider:before { content:''; position:absolute; width:18px; height:18px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.3s; }
input:checked + .slider { background:var(--success); }
input:checked + .slider:before { transform:translateX(20px); }
.header-actions { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
.cat-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.cat-tab { padding:7px 16px; border-radius:20px; border:1.5px solid var(--border); background:white; font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:600; cursor:pointer; transition:var(--transition); }
.cat-tab.active { background:var(--blue); color:white; border-color:var(--blue); }
.cat-tag { background:var(--off-white); border-radius:12px; padding:2px 8px; font-size:.75rem; color:var(--muted); }
</style>
</head>
<body>
<button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo"><img src="/assets/img/logo.jpg" alt="NuevaExpress"><span class="logo-text">Nueva<span>Express</span></span></div>
      <div style="color:rgba(255,255,255,.4);font-size:.8rem;margin-top:4px" id="sidebarUser"></div>
    </div>
    <ul class="sidebar-nav">
      <li><a href="index.html">📋 Pedidos</a></li>
      <li><a href="perfil.html">🏪 Mi Perfil</a></li>
      <li><a href="productos.html" class="active">📦 Productos</a></li>
      <li><a href="#" onclick="APP.logout()">🚪 Cerrar Sesión</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="header-actions">
      <div class="page-header" style="margin:0">
        <h1>Productos / Servicios</h1>
        <p>Aparecen en tu perfil y sirven para búsquedas y pedidos</p>
      </div>
      <button class="btn-primary" onclick="openModal()">+ Agregar producto</button>
    </div>

    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <input type="text" id="searchQ" placeholder="🔍 Buscar producto..." oninput="filterProducts()" style="flex:1;min-width:180px;padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none">
      <select id="statusFilter" onchange="filterProducts()" style="padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;background:white">
        <option value="">Todos</option>
        <option value="1">✅ Activos</option>
        <option value="0">⏸ Inactivos</option>
      </select>
      <span id="prodCount" style="font-size:.82rem;color:var(--muted)"></span>
    </div>
    <div id="productsContainer"><div class="loading-state"><div class="spinner"></div></div></div>
  </main>
</div>

<!-- Category Modal -->
<div class="modal-form" id="catModal" style="display:none">
  <div class="modal-form-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 style="font-size:1.1rem">🏷️ Categorías de productos</h2>
      <button onclick="closeCatModal()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <div id="catList" style="margin-bottom:16px"></div>
    <div style="display:flex;gap:8px">
      <input type="text" id="newCatIcon" placeholder="🏷️" maxlength="4" style="width:56px;padding:9px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;text-align:center;font-size:1.2rem;outline:none">
      <input type="text" id="newCatName" placeholder="Nombre de categoría..." style="flex:1;padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none">
      <button onclick="addCategory()" class="btn-primary" style="padding:9px 16px">+ Agregar</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-form" id="productModal" style="display:none">
  <div class="modal-form-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h3 id="modalTitle">Nuevo Producto</h3>
      <button onclick="closeModal()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <div class="form-group">
      <label>Nombre *</label>
      <input type="text" id="p_name" placeholder="Ceviche mixto">
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea id="p_description" rows="2" placeholder="Descripción breve del producto o servicio"></textarea>
    </div>
    <div class="form-group">
      <label>Precio (Q) <span style="color:var(--muted);font-weight:400">— déjalo vacío si varía</span></label>
      <input type="number" id="p_price" placeholder="45.00" step="0.50" min="0">
    </div>
    <div class="form-group">
      <label>Foto del producto</label>
      <div style="display:flex;gap:12px;align-items:center">
        <div style="width:72px;height:72px;border-radius:10px;overflow:hidden;background:var(--off-white);border:1px solid var(--border);flex-shrink:0">
          <img id="p_photoPreview" src="" style="width:100%;height:100%;object-fit:cover;display:none">
          <div id="p_photoPlaceholder" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.5rem">📦</div>
        </div>
        <div>
          <input type="file" id="p_photoInput" accept="image/*" style="display:none" onchange="previewProductPhoto(this)">
          <button class="btn-ghost" style="padding:7px 14px;font-size:.85rem" onclick="document.getElementById('p_photoInput').click()">📷 Subir foto</button>
        </div>
      </div>
    </div>
    <div class="toggle-available" style="margin-bottom:20px">
      <label class="switch"><input type="checkbox" id="p_available" checked><span class="slider"></span></label>
      <span style="font-size:.9rem">Disponible para pedidos</span>
    </div>
    <input type="hidden" id="p_id">
    <div style="display:flex;gap:10px">
      <button class="btn-primary" style="flex:1;justify-content:center;padding:13px" onclick="saveProduct()">Guardar</button>
      <button class="btn-ghost" onclick="closeModal()" style="padding:13px 20px">Cancelar</button>
    </div>
  </div>
</div>

<script src="../assets/js/app.js"></script>
<script>
  // Recover token from URL hash if localStorage is empty
  (function() {
    var hash = window.location.hash;
    if (hash && hash.indexOf('tk=') !== -1) {
      var parts = hash.substring(1).split('&');
      var tk = '', us = '';
      parts.forEach(function(p) {
        if (p.indexOf('tk=') === 0) tk = p.substring(3);
        if (p.indexOf('us=') === 0) us = decodeURIComponent(p.substring(3));
      });
      if (tk) {
        localStorage.setItem('nuevaexpress_token', tk);
        if (us) localStorage.setItem('nuevaexpress_user', us);
        // Clean URL
        history.replaceState(null, '', window.location.pathname);
      }
    }
  })();

var adminUser  = JSON.parse(localStorage.getItem('nuevaexpress_user') || '{}');
if (!localStorage.getItem('nuevaexpress_token') || adminUser.role !== 'negocio') { window.location.href = '/cliente/login.html'; }
document.getElementById('sidebarUser').textContent = APP.user().name || '';

let bizId = null;
let categories = [];
let activeCatId = null;

// ── Category management ───────────────────────────────────────
async function loadCategories() {
  const res = await APP.get(`/product-categories?business_id=${bizId}`);
  categories = res?.data || [];
  renderCatTabs();
  renderCatSelect();
  renderCatList();
}

function renderCatTabs() {
  const tabs = document.getElementById('catTabs');
  let html = '<button class="cat-tab '+(activeCatId===null?'active':'')+'" onclick="filterByCat(null,this)">🏷️ Todas</button>';
  categories.forEach(function(c){
    html += '<button class="cat-tab '+(activeCatId===c.id?'active':'')+'" onclick="filterByCat('+c.id+',this)">'+(c.icon||'🏷️')+' '+APP.esc(c.name)+'</button>';
  });
  tabs.innerHTML = html;
}

function renderCatSelect() {
  const sel = document.getElementById('p_category');
  sel.innerHTML = '<option value="">Sin categoría</option>';
  categories.forEach(function(c){
    sel.innerHTML += '<option value="'+c.id+'">'+(c.icon||'🏷️')+' '+APP.esc(c.name)+'</option>';
  });
}

function renderCatList() {
  const el = document.getElementById('catList');
  if (!categories.length) { el.innerHTML = '<p style="color:var(--muted);font-size:.85rem">No hay categorías aún.</p>'; return; }
  el.innerHTML = categories.map(function(c){
    return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">' +
      '<span style="font-size:1.2rem">'+c.icon+'</span>' +
      '<span style="flex:1;font-weight:600">'+APP.esc(c.name)+'</span>' +
      '<button onclick="deleteCategory('+c.id+')" class="icon-btn danger" style="padding:5px 10px;font-size:.8rem">🗑️</button>' +
    '</div>';
  }).join('');
}

function filterByCat(catId, btn) {
  activeCatId = catId;
  document.querySelectorAll('.cat-tab').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  filterProducts();
}

function openCatModal() { document.getElementById('catModal').style.display = 'flex'; }
function closeCatModal() { document.getElementById('catModal').style.display = 'none'; }

async function addCategory() {
  const name = document.getElementById('newCatName').value.trim();
  const icon = document.getElementById('newCatIcon').value.trim() || '🏷️';
  if (!name) return;
  const res = await APP.post('/product-categories', { business_id: bizId, name, icon });
  if (res?.success) {
    document.getElementById('newCatName').value = '';
    document.getElementById('newCatIcon').value = '';
    await loadCategories();
    APP.toast('Categoría creada');
  }
}

async function deleteCategory(id) {
  if (!confirm('¿Eliminar esta categoría? Los productos quedarán sin categoría.')) return;
  const res = await APP.delete('/product-categories/' + id);
  if (res?.success) { await loadCategories(); await loadProducts(); APP.toast('Categoría eliminada'); }
}
let products = [];
let photoFileToUpload = null;

async function init() {
  // Get biz id
  const me = await APP.fetch('/auth/me');
  const bizRes = await APP.get('/businesses?limit=50');
  const all = bizRes?.data?.businesses || [];
  const biz = all.find(b => b.user_id == me.data.id) || all[0];
  if (!biz) { document.getElementById('productsContainer').innerHTML = '<div class="empty-state"><p>Primero crea tu negocio en <a href="perfil.html" style="color:var(--accent)">Mi Perfil</a>.</p></div>'; return; }
  bizId = biz.id;
  loadProducts();
}

var allProducts = [];

async function loadProducts() {
  const res = await APP.get(`/products?business_id=${bizId}`);
  allProducts = res?.data || [];
  products = allProducts;
  filterProducts();
}

function filterProducts() {
  var q  = (document.getElementById('searchQ')?.value || '').toLowerCase();
  var st = document.getElementById('statusFilter')?.value || '';
  var filtered = allProducts.filter(function(p) {
    var mQ = !q || p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q);
    var mS = st === '' || parseInt(p.is_available) === parseInt(st);
    var mC = activeCatId === null || p.category_id == activeCatId;
    return mQ && mS && mC;
  });
  var pc = document.getElementById('prodCount');
  if (pc) pc.textContent = filtered.length + ' producto' + (filtered.length !== 1 ? 's' : '');
  const container = document.getElementById('productsContainer');
  if (!filtered.length) {
    container.innerHTML = allProducts.length ?
      '<div class="empty-state"><p>No hay productos que coincidan.</p></div>' :
      '<div class="empty-state"><p>No tienes productos registrados.</p><button class="btn-primary" style="margin-top:16px" onclick="openModal()">+ Agregar el primero</button></div>';
    return;
  }
  container.innerHTML = `<div class="products-table-wrap">${filtered.map(renderProductRow).join('')}</div>`;
}

function renderProductRow(p) {
  return `
    <div class="prod-row" id="prod-row-${p.id}">
      <div class="prod-thumb">
        ${p.photo ? `<img src="${APP.esc(p.photo)}" alt="">` : '📦'}
      </div>
      <div>
        <div class="prod-name">${APP.esc(p.name)}</div>
        ${p.description ? `<div class="prod-desc">${APP.esc(p.description)}</div>` : ''}
      </div>
      <div class="prod-price">${p.price ? APP.money(p.price) : '<span style="color:var(--muted);font-weight:400">Precio variable</span>'}</div>
      <div class="prod-actions">
        <button class="icon-btn" onclick="openModal(${p.id})" title="Editar">✏️</button>
        <button class="icon-btn" onclick="toggleAvailable(${p.id}, ${p.is_available?0:1})" title="${p.is_available?'Desactivar':'Activar'}">${p.is_available?'⏸':'▶'}</button>
        <button class="icon-btn danger" onclick="deleteProduct(${p.id})" title="Eliminar">🗑️</button>
      </div>
    </div>`;
}

async function toggleAvailable(id, available) {
  const val = parseInt(available);
  const res = await APP.put(`/products/${id}`, { is_available: val });
  if (!res?.success) APP.toast('Error al actualizar', 'error');
  else { APP.toast(val ? 'Producto activado' : 'Producto desactivado'); loadProducts(); }
}

function openModal(productId = null) {
  photoFileToUpload = null;
  const p = productId ? products.find(x => x.id === productId) : null;
  document.getElementById('modalTitle').textContent = p ? 'Editar Producto' : 'Nuevo Producto';
  document.getElementById('p_id').value = productId || '';
  document.getElementById('p_name').value = p?.name || '';
  document.getElementById('p_description').value = p?.description || '';
  document.getElementById('p_price').value = p?.price || '';
  document.getElementById('p_available').checked = p ? !!p.is_available : true;
  document.getElementById('p_category').value = p?.category_id || '';
  const preview = document.getElementById('p_photoPreview');
  const placeholder = document.getElementById('p_photoPlaceholder');
  if (p?.photo) { preview.src = p.photo; preview.style.display = 'block'; placeholder.style.display = 'none'; }
  else { preview.style.display = 'none'; placeholder.style.display = 'flex'; }
  document.getElementById('productModal').style.display = 'flex';
}

function closeModal() { document.getElementById('productModal').style.display = 'none'; }

function previewProductPhoto(input) {
  if (!input.files[0]) return;
  photoFileToUpload = input.files[0];
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('p_photoPreview').src = e.target.result;
    document.getElementById('p_photoPreview').style.display = 'block';
    document.getElementById('p_photoPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}

async function saveProduct() {
  const id   = document.getElementById('p_id').value;
  const name = document.getElementById('p_name').value.trim();
  if (!name) { APP.toast('El nombre es requerido', 'error'); return; }

  let photoUrl = null;
  if (photoFileToUpload) {
    APP.toast('Subiendo foto...', 'info');
    const upRes = await APP.upload(photoFileToUpload, 'products');
    if (upRes?.success) photoUrl = upRes.data.url;
  }

  const payload = {
    business_id: bizId,
    name,
    description: document.getElementById('p_description').value,
    price: document.getElementById('p_price').value || null,
    is_available: document.getElementById('p_available').checked ? 1 : 0,
  };
  if (photoUrl) payload.photo = photoUrl;

  let res;
  if (id) res = await APP.put(`/products/${id}`, payload);
  else res = await APP.post('/products', payload);

  if (res?.success) {
    APP.toast(id ? 'Producto actualizado' : 'Producto agregado');
    closeModal();
    loadProducts();
  } else {
    APP.toast(res?.message || 'Error', 'error');
  }
}

async function deleteProduct(id) {
  if (!confirm('¿Eliminar este producto?')) return;
  const res = await APP.delete(`/products/${id}`);
  if (res?.success) { APP.toast('Producto eliminado'); loadProducts(); }
  else APP.toast('Error', 'error');
}

document.getElementById('productModal').addEventListener('click', e => {
  if (e.target.id === 'productModal') closeModal();
});

init();
</script>

<script>
function toggleSidebar() {
  var sidebar = document.querySelector('.sidebar');
  var overlay = document.getElementById('sidebarOverlay');
  if (sidebar) sidebar.classList.toggle('open');
  if (overlay) overlay.classList.toggle('open');
}
</script>

<script src="/assets/js/pwa.js"></script>
</body>
</html>
