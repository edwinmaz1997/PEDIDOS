<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4A90D9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NuevaExpress">
<link rel="apple-touch-icon" href="/assets/img/logo.jpg">
<link rel="icon" type="image/jpeg" href="/assets/img/logo.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panel Negocio — NuevaExpress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/main.css">
<style>
.order-card { background:white;border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:16px; }
.order-header { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px; }
.order-client { font-size:.85rem;color:var(--muted);margin-top:4px; }
.order-items-list { margin:10px 0; }
.order-item-line { font-size:.9rem;padding:4px 0;border-bottom:1px solid var(--border); display:flex; justify-content:space-between; }
.order-item-line:last-child{border-bottom:none;}
.respond-form { background:var(--off-white);border-radius:var(--radius-sm);padding:16px;margin-top:12px; }
.respond-form h4 { margin-bottom:10px;font-size:.95rem; }
.respond-row { display:flex;gap:10px;flex-wrap:wrap; }
.tab-nav { display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap; }
.tab-btn { padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:.85rem;font-family:'DM Sans',sans-serif;transition:var(--transition); }
.tab-btn.active { background:var(--charcoal);color:white;border-color:var(--charcoal); }
.bell-badge { display:inline-block;background:var(--accent);color:white;border-radius:10px;font-size:.7rem;padding:1px 6px;margin-left:4px; }
</style>
</head>
<body>
<button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo"><img src="/assets/img/logo.jpg" alt="NuevaExpress" style="height:38px;border-radius:8px"><span class="logo-text">Nueva<span>Express</span></span></div>
      <div style="color:rgba(255,255,255,.4);font-size:.8rem;margin-top:4px" id="sidebarUser">Mi Negocio</div>
    </div>
    <ul class="sidebar-nav">
      <li id="navPedidos"><a href="index.html" class="active">📋 Pedidos</a></li>
      <li><a href="perfil.html">🏪 Mi Perfil</a></li>
      <li id="navProductos"><a href="productos.html">📦 Productos</a></li>
      <li id="navServicios" style="display:none"><a href="servicios.html">🔧 Mis Servicios</a></li>
      <li><a href="promociones.html">🏷️ Promociones</a></li>
      <li><a href="reportes.html">📊 Reportes</a></li>
      <li><a href="#" onclick="doLogout()">🚪 Cerrar Sesión</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Panel del Negocio</h1>
      <p id="bizNameHeader">Gestiona tus pedidos entrantes</p>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label">Pedidos hoy</div><div class="stat-value" id="statToday">—</div></div>
      <div class="stat-card"><div class="stat-label">Pendientes</div><div class="stat-value" id="statPending" style="color:var(--warning)">—</div></div>
      <div class="stat-card"><div class="stat-label">En preparación</div><div class="stat-value" id="statPrep" style="color:var(--accent)">—</div></div>
      <div class="stat-card"><div class="stat-label">Entregados hoy</div><div class="stat-value" id="statDone" style="color:var(--success)">—</div></div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" onclick="loadOrders('pendiente',this)">⏳ Pendientes <span class="bell-badge" id="pendingCount"></span></button>
      <button class="tab-btn" onclick="loadOrders('aceptado',this)">✅ Aceptados</button>
      <button class="tab-btn" onclick="loadOrders('en_preparacion',this)">👨‍🍳 En prep.</button>
      <button class="tab-btn" onclick="loadOrders('listo',this)">📦 Listos</button>
      <button class="tab-btn" onclick="loadOrders('cancelado',this)">✕ Cancelados</button>
      <button class="tab-btn" onclick="loadEntregadosHoy(this)">✔ Entregados hoy</button>
      <button class="tab-btn" onclick="loadOrders('',this)">Todos</button>
    </div>

    <div style="display:flex;gap:10px;margin:12px 0;flex-wrap:wrap">
      <input type="text" id="searchQ" placeholder="🔍 Buscar por #pedido, cliente..." oninput="applySearch()" style="flex:1;min-width:180px;padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none">
      <span id="orderCount" style="font-size:.82rem;color:var(--muted);align-self:center"></span>
      <button id="downloadBtn" onclick="downloadOrders()" style="display:none;align-items:center;gap:6px;padding:9px 16px;background:var(--success);color:white;border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600">📥 Descargar CSV</button>
    </div>
    <div id="ordersContainer"><div class="loading-state"><div class="spinner"></div></div></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<script>
const API = '/api';
const user  = JSON.parse(localStorage.getItem('nuevaexpress_user') || '{}');
var adminUser = JSON.parse(localStorage.getItem('nuevaexpress_user') || '{}');
if (!localStorage.getItem('nuevaexpress_token') || adminUser.role !== 'negocio') window.location.href = '/cliente/login.html';
document.getElementById('sidebarUser').textContent = user.name || 'Mi Negocio';

// Validar negocio y adaptar sidebar
(async function() {
  try {
    const res  = await fetch(API + '/businesses/mine', { headers: { Authorization: 'Bearer ' + localStorage.getItem('nuevaexpress_token') } });
    const data = await res.json();

    if (!data.success || !data.data) {
      // No tiene negocio — redirigir a crear
      window.location.href = '/negocio/crear-negocio.html';
      return;
    }

    const biz = data.data;

    if (!biz.is_active) {
      // Negocio pendiente de aprobación — mostrar pantalla de espera
      document.querySelector('.main-content').innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px">
          <div style="font-size:3rem;margin-bottom:16px">⏳</div>
          <h2 style="margin-bottom:8px">Tu negocio está en revisión</h2>
          <p style="color:var(--muted);max-width:400px;margin-bottom:24px">
            Hemos recibido tu solicitud para <strong>${biz.name}</strong>. 
            El equipo de NuevaExpress la revisará pronto y recibirás una notificación cuando sea aprobada.
          </p>
          <div style="background:var(--off-white);border-radius:12px;padding:16px 24px;font-size:.85rem;color:var(--muted)">
            ¿Tienes dudas? Contáctanos por WhatsApp
          </div>
        </div>`;
      return;
    }

    // Negocio activo — adaptar sidebar según tipo
    if (biz.business_type === 'servicios') {
      document.getElementById('navPedidos').style.display = 'none';
      document.getElementById('navProductos').style.display = 'none';
      document.getElementById('navServicios').style.display = 'block';
      // Redirigir a servicios ya que no manejan pedidos
      window.location.replace('servicios.html');
    }
  } catch(e) {}
})();

const statusLabels = { pendiente:'⏳ Pendiente', aceptado:'✅ Aceptado', en_preparacion:'👨‍🍳 En preparación', listo:'📦 Listo', en_camino:'🛵 En camino', entregado:'✔ Entregado', cancelado:'✕ Cancelado' };
const statusBadge  = { pendiente:'badge-pending', aceptado:'badge-accepted', en_preparacion:'badge-delivery', listo:'badge-active', en_camino:'badge-delivery', entregado:'badge-done', cancelado:'badge-cancel' };
const nextStatus   = { aceptado:'en_preparacion', en_preparacion:'listo', listo:'entregado' };
const nextLabel    = { aceptado:'Iniciar preparación', en_preparacion:'Marcar listo', listo:'Marcar entregado' };

var allOrders = [];
var currentStatus = '';
var page = 1;
var perPage = 10;

function renderPagination(total) {
  var pages = Math.ceil(total/perPage);
  var el = document.getElementById('pagination');
  if (!el||pages<=1){if(el)el.innerHTML='';return;}
  var html='<button class="page-btn" onclick="goPage('+(page-1)+')" '+(page===1?'disabled':'')+'>‹</button>';
  for(var i=1;i<=pages;i++){
    if(i===1||i===pages||(i>=page-2&&i<=page+2))html+='<button class="page-btn '+(i===page?'active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
    else if(i===page-3||i===page+3)html+='<span class="page-info">…</span>';
  }
  html+='<button class="page-btn" onclick="goPage('+(page+1)+')" '+(page===pages?'disabled':'')+'>›</button>';
  el.innerHTML=html;
}

function goPage(p){
  var pages=Math.ceil(filteredOrders.length/perPage);
  if(p<1||p>pages)return;
  page=p;
  renderOrders();
  window.scrollTo(0,0);
}

var filteredOrders = [];

function applySearch() {
  var q = (document.getElementById('searchQ')?.value || '').toLowerCase();
  filteredOrders = allOrders.filter(function(o) {
    return !q ||
      (o.order_number||'').toLowerCase().includes(q) ||
      (o.client_name||'').toLowerCase().includes(q) ||
      (o.client_phone||'').toLowerCase().includes(q);
  });
  page = 1;
  renderOrders();
}

function renderOrders() {
  var pageData = filteredOrders.slice((page-1)*perPage, page*perPage);
  var container = document.getElementById('ordersContainer');
  var oc = document.getElementById('orderCount');
  if (oc) oc.textContent = filteredOrders.length + ' pedido' + (filteredOrders.length !== 1 ? 's' : '');
  renderPagination(filteredOrders.length);
  if (!pageData.length) {
    container.innerHTML = '<div class="empty-state"><p>No hay pedidos.</p></div>';
    return;
  }
  container.innerHTML = pageData.map(renderOrder).join('');
  startNegocioTimers();
}

async function loadEntregadosHoy(tabBtn) {
  if (tabBtn) { document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); }); tabBtn.classList.add('active'); }
  currentStatus = 'entregado';
  page = 1;
  document.getElementById('ordersContainer').innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
  try {
    var res = await fetch(API + '/orders?status=entregado', { headers: { Authorization: 'Bearer ' + localStorage.getItem('nuevaexpress_token') } });
    var data = await res.json();
    var now = new Date();
    var today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
    allOrders = (data.data?.orders || []).filter(function(o){
      var fecha = o.updated_at || o.created_at || '';
      if (!fecha) return false;
      var d = new Date(fecha.replace(' ','T'));
      var ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      return ds === today;
    });
    filteredOrders = allOrders.slice();
    if (document.getElementById('searchQ')) document.getElementById('searchQ').value = '';
    const dlBtn = document.getElementById('downloadBtn'); if (dlBtn) dlBtn.style.display = 'inline-flex';
    renderOrders();
  } catch(e) { document.getElementById('ordersContainer').innerHTML = '<div class="empty-state"><p>Error cargando pedidos.</p></div>'; }
}

function localDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function downloadOrders() {
  var rows = [['#Pedido','Cliente','Teléfono','Tipo','Productos','Subtotal','Delivery','Total','Fecha']];
  filteredOrders.forEach(function(o){
    var items = (o.items||[]).map(function(i){ return i.product_name + ' x' + i.quantity; }).join(', ');
    var subtotal = parseFloat(o.subtotal||0);
    var delivery = parseFloat(o.delivery_fee||0);
    var total    = subtotal + delivery;
    rows.push([
      o.order_number,
      '"' + (o.client_name||'').replace(/"/g,'""') + '"',
      o.client_phone||'',
      o.delivery_type==='delivery'?'Delivery':'Recoger',
      '"' + items.replace(/"/g,'""') + '"',
      'Q' + subtotal.toFixed(2),
      'Q' + delivery.toFixed(2),
      'Q' + total.toFixed(2),
      o.created_at||''
    ]);
  });
  // Fila de totales
  var totalSubtotal = filteredOrders.reduce(function(s,o){ return s + parseFloat(o.subtotal||0); }, 0);
  var totalDelivery = filteredOrders.reduce(function(s,o){ return s + parseFloat(o.delivery_fee||0); }, 0);
  var totalGeneral  = totalSubtotal + totalDelivery;
  rows.push(['','','','','TOTAL','Q'+totalSubtotal.toFixed(2),'Q'+totalDelivery.toFixed(2),'Q'+totalGeneral.toFixed(2),'']);

  var csv = '\uFEFF' + rows.map(function(r){ return r.join(','); }).join('\n');
  var today = localDate(new Date());
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'entregados_' + today + '.csv';
  a.click();
}

async function loadOrders(status, tabBtn) {
  const dlBtn = document.getElementById('downloadBtn'); if (dlBtn) dlBtn.style.display = 'none';
  if (tabBtn) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); tabBtn.classList.add('active'); }
  currentStatus = status || '';
  page = 1;
  document.getElementById('ordersContainer').innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
  try {
    const qs = status ? '?status=' + status : '';
    const res = await fetch(API + '/orders' + qs, { headers: { Authorization: 'Bearer ' + localStorage.getItem('nuevaexpress_token') } });
    const data = await res.json();
    allOrders = data.data?.orders || [];
    filteredOrders = allOrders.slice();
    if (document.getElementById('searchQ')) document.getElementById('searchQ').value = '';
    updateStats(allOrders);
    renderOrders();
  } catch(e) { document.getElementById('ordersContainer').innerHTML = '<div class="empty-state"><p>Error cargando pedidos.</p></div>'; }
}

function startNegocioTimers() {
  document.querySelectorAll('[data-ts][data-mins]').forEach(function(el) {
    var id = el.id.replace('ntimer-', '');
    var acceptedAt = el.dataset.ts ? parseInt(el.dataset.ts)*1000 : new Date(el.dataset.started.replace(' ','T')+'Z').getTime();
    var totalMs = parseInt(el.dataset.mins) * 60000;
    function tick() {
      var now = Date.now(), elapsed = now - acceptedAt, remaining = totalMs - elapsed;
      var cd = document.getElementById('ncd-' + id);
      var pr = document.getElementById('nprog-' + id);
      var lb = document.getElementById('nlbl-' + id);
      if (!cd) return;
      if (remaining <= 0) {
        var over = Math.round(-remaining / 60000);
        cd.textContent = '¡Listo!'; cd.style.color = '#16a34a';
        if (pr) { pr.style.width = '100%'; pr.style.background = 'linear-gradient(90deg,#22c55e,#16a34a)'; }
        if (lb) lb.textContent = over > 0 ? '🙏 Perdón por el atraso — ' + over + ' min extra' : '✅ Listo para entregar';
        el.style.background = '#f0fdf4'; el.style.borderColor = '#86efac';
        return;
      }
      var pct = Math.min(100, (elapsed / totalMs) * 100);
      var mins = Math.floor(remaining / 60000);
      var secs = Math.floor((remaining % 60000) / 1000);
      if (pr) pr.style.width = pct.toFixed(1) + '%';
      cd.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
      if (lb) lb.textContent = 'Faltan ' + mins + ' min para entregar al cliente';
      setTimeout(tick, 1000);
    }
    tick();
  });
}

function renderOrder(o) {
  const items = (o.items || []).map(i => `<div class="order-item-line"><span>${esc(i.product_name)} ×${i.quantity}</span>${i.notes?`<span style="color:var(--muted);font-size:.8rem">${esc(i.notes)}</span>`:''}</div>`).join('');
  const canRespond = o.status === 'pendiente';
  const canAdvance = nextStatus[o.status];
  return `
    <div class="order-card" id="order-${o.id}">
      <div class="order-header">
        <div>
          <strong>${esc(o.order_number)}</strong>
          <div class="order-client">👤 ${esc(o.client_name)} ${o.client_phone?`· <a href="tel:${esc(o.client_phone)}">${esc(o.client_phone)}</a>`:''}</div>
          <div style="font-size:.8rem;color:var(--muted)">${new Date(o.created_at).toLocaleString('es-GT')}</div>
          ${o.delivery_type==='delivery'?`<div style="font-size:.8rem;color:var(--accent)">🛵 Delivery: ${esc(o.delivery_address||'')}</div>`:'<div style="font-size:.8rem;color:var(--muted)">🏃 Recoger en negocio</div>'}
        </div>
        <span class="badge ${statusBadge[o.status]||'badge-pending'}">${statusLabels[o.status]||o.status}</span>
      </div>
      ${items?`<div class="order-items-list">${items}</div>`:''}
      ${o.notes?`<div style="background:var(--off-white);padding:8px 12px;border-radius:var(--radius-sm);font-size:.85rem;margin-top:8px">📝 ${esc(o.notes)}</div>`:''}
      ${o.estimated_time && o.preparation_started_at && o.status === 'en_preparacion' ? `
        <div id="ntimer-${o.id}" data-ts="${o.prep_ts}" data-started="${o.preparation_started_at}" data-mins="${o.estimated_time}" style="margin-top:10px;background:#fefce8;border:1.5px solid #fde047;border-radius:10px;padding:10px 14px">
          <div style="font-size:.73rem;font-weight:700;color:#854d0e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">⏱️ Tiempo prometido al cliente</div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="flex:1;background:#fef9c3;border-radius:20px;height:7px;overflow:hidden">
              <div id="nprog-${o.id}" style="height:100%;background:linear-gradient(90deg,#f59e0b,#d97706);border-radius:20px;width:0%"></div>
            </div>
            <div id="ncd-${o.id}" style="font-size:1rem;font-weight:800;color:#b45309;min-width:52px;text-align:right">--:--</div>
          </div>
          <div id="nlbl-${o.id}" style="font-size:.72rem;color:#92400e;margin-top:3px">Calculando...</div>
        </div>
      ` : ''}
      <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;font-size:.85rem;color:var(--muted);margin-bottom:4px">
          <span>Total cobrado al cliente</span><span>Q${parseFloat(o.total).toFixed(2)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-weight:700">
          <span>Tu ingreso neto</span><span style="color:var(--success)">Q${parseFloat(o.net_income||((o.subtotal||0)-(o.service_fee||3))).toFixed(2)}</span>
        </div>
      </div>
      <div style="margin-top:8px"><a href="pedido-detalle.html?id=${o.id}" class="btn-ghost" style="font-size:.82rem;padding:6px 14px">💬 Chat y detalle</a></div>
      ${canRespond ? `
        <div class="respond-form">
          <h4>Responder pedido</h4>
          <div class="form-group" style="margin-bottom:10px">
            <textarea id="resp-${o.id}" rows="2" placeholder="Mensaje al cliente (opcional)..." style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.9rem"></textarea>
          </div>
          <div class="form-group" style="margin-bottom:10px">
            <label style="font-size:.82rem;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:4px;margin-bottom:5px">
              ⏱️ Tiempo estimado de preparación <span style="color:var(--danger)">*</span>
            </label>
            <div style="display:flex;align-items:center;gap:8px">
              <input type="number" id="time-${o.id}" placeholder="Ej: 20" min="1" max="180"
                style="width:100px;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.95rem">
              <span style="font-size:.85rem;color:var(--muted)">minutos</span>
            </div>
            <div style="font-size:.75rem;color:var(--muted);margin-top:4px">El cliente verá un contador con el tiempo restante</div>
          </div>
          <div class="respond-row">
            <button class="btn-primary" onclick="respond(${o.id},'aceptar')" style="padding:9px 18px">✅ Aceptar</button>
            <button class="btn-ghost" onclick="respond(${o.id},'rechazar')" style="padding:9px 18px;color:var(--danger);border-color:var(--danger)">✕ Rechazar</button>
          </div>
        </div>
      ` : ''}
      ${canAdvance ? `<div style="margin-top:12px"><button class="btn-primary" onclick="advanceStatus(${o.id},'${nextStatus[o.status]}')" style="padding:9px 18px">${nextLabel[o.status]}</button></div>` : ''}
    </div>
  `;
}

async function respond(orderId, action) {
  const response = document.getElementById(`resp-${orderId}`)?.value || '';
  const estTime  = parseInt(document.getElementById(`time-${orderId}`)?.value) || null;

  if (action === 'aceptar' && (!estTime || estTime < 1)) {
    const inp = document.getElementById(`time-${orderId}`);
    inp.style.border = '1.5px solid var(--danger)';
    inp.focus();
    setTimeout(() => inp.style.border = '1.5px solid var(--border)', 3000);
    alert('⏱️ Debes indicar el tiempo estimado de preparación');
    return;
  }
  try {
    const res = await fetch(`${API}/orders/${orderId}/respond`, {
      method: 'PUT', headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + localStorage.getItem('nuevaexpress_token') },
      body: JSON.stringify({ action, response, estimated_time: estTime })
    });
    const data = await res.json();
    if (data.success) loadOrders('pendiente', null);
    else alert(data.message);
  } catch(e) { alert('Error de conexión'); }
}

async function advanceStatus(orderId, status) {
  try {
    var payload = { status };
    if (status === 'en_preparacion') payload.client_ts = Math.floor(Date.now() / 1000);
    const res = await fetch(`${API}/orders/${orderId}/status`, {
      method:'PUT', headers:{'Content-Type':'application/json', Authorization: 'Bearer ' + localStorage.getItem('nuevaexpress_token')},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.success) loadOrders('', null);
    else alert(data.message);
  } catch(e) { alert('Error de conexión'); }
}

function updateStats(orders) {
  var _now = new Date();
  var _hoy = _now.getFullYear() + '-' + String(_now.getMonth()+1).padStart(2,'0') + '-' + String(_now.getDate()).padStart(2,'0');
  function _isToday(s) { if(!s)return false; var d=new Date((s||'').replace(' ','T')); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')===_hoy; }
  document.getElementById('statToday').textContent = orders.filter(o => _isToday(o.created_at)).length;
  document.getElementById('statPending').textContent = orders.filter(o=>o.status==='pendiente').length;
  document.getElementById('statPrep').textContent = orders.filter(o=>o.status==='en_preparacion').length;
  document.getElementById('statDone').textContent = orders.filter(o=>o.status==='entregado' && _isToday(o.updated_at||o.created_at)).length;
  const pending = orders.filter(o=>o.status==='pendiente').length;
  document.getElementById('pendingCount').textContent = pending || '';
  document.getElementById('pendingCount').style.display = pending ? '' : 'none';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function doLogout() { localStorage.clear(); window.location.href = '/cliente/login.html'; }

loadOrders('pendiente', null);

</script>

<script>
  // Recover token from URL hash if localStorage is empty
  (function() {
    var hash = window.location.hash;
    if (hash && hash.indexOf('tk=') !== -1) {
      var parts = hash.substring(1).split('&');
      var tk = '', us = '';
      parts.forEach(function(p) {
        if (p.indexOf('tk=') === 0) tk = p.substring(3);
        if (p.indexOf('us=') === 0) us = decodeURIComponent(p.substring(3));
      });
      if (tk) {
        localStorage.setItem('nuevaexpress_token', tk);
        if (us) localStorage.setItem('nuevaexpress_user', us);
        // Clean URL
        history.replaceState(null, '', window.location.pathname);
      }
    }
  })();

function toggleSidebar() {
  var sidebar = document.querySelector('.sidebar');
  var overlay = document.getElementById('sidebarOverlay');
  if (sidebar) sidebar.classList.toggle('open');
  if (overlay) overlay.classList.toggle('open');
}
</script>

<script src="/assets/js/pwa.js"></script>
<script>
var lastPendingCount = null;
setInterval(async function() {
  const res = await APP.get('/orders' + (currentStatus ? '?status=' + currentStatus : ''));
  if (!res?.success) return;
  const newOrders = res.data?.orders || [];
  const pendingNow = newOrders.filter(function(o){ return o.status === 'pendiente'; }).length;
  if (lastPendingCount !== null && pendingNow > lastPendingCount) {
    var diff = pendingNow - lastPendingCount;
    APP.toast('🔔 ' + diff + ' nuevo' + (diff > 1 ? 's' : '') + ' pedido' + (diff > 1 ? 's' : '') + ' pendiente' + (diff > 1 ? 's' : ''), 'success');
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = ctx.createOscillator(); var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; gain.gain.value = 0.3;
      osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
  }
  lastPendingCount = pendingNow;
  allOrders = newOrders;
  filteredOrders = allOrders.slice();
  document.getElementById('searchQ').value = '';
  renderOrders();
}, 8000);
</script>
