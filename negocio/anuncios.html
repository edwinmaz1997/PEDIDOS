<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4A90D9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anuncios — Mi Negocio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/main.css">
<style>
.anuncio-card{background:white;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.anuncio-img{width:100%;height:160px;object-fit:cover;display:block}
.anuncio-body{padding:16px}
</style>
</head>
<body>
<button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo"><img src="/assets/img/logo.jpg" alt="NuevaExpress"><span class="logo-text">Nueva<span>Express</span></span></div>
      <div style="color:rgba(255,255,255,.4);font-size:.75rem;margin-top:4px" id="sidebarUser"></div>
    </div>
    <ul class="sidebar-nav">
      <li><a href="index.html">📋 Pedidos</a></li>
      <li><a href="productos.html">🛍️ Productos</a></li>
      <li><a href="promociones.html">🏷️ Promociones</a></li>
      <li><a href="anuncios.html" class="active">📢 Anuncios</a></li>
      <li><a href="reportes.html">📊 Reportes</a></li>
      <li><a href="perfil.html">⚙️ Perfil</a></li>
      <li><a href="#" onclick="doLogout()">🚪 Salir</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">
      <div class="page-header" style="margin:0">
        <h1>📢 Mis Anuncios</h1>
        <p>Comunica novedades a tus clientes</p>
      </div>
      <button onclick="openCreate()" class="btn-primary" style="padding:10px 20px">+ Nuevo anuncio</button>
    </div>

    <div id="loadingEl" style="text-align:center;padding:40px"><div class="spinner" style="margin:auto"></div></div>
    <div id="noData" style="display:none;text-align:center;padding:40px;color:var(--muted)">Aún no tienes anuncios publicados.</div>
    <div id="anuncioList"></div>
  </main>
</div>

<!-- Modal crear/editar -->
<div id="formModal" onclick="if(event.target===this)closeModal()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center;padding:16px">
  <div style="background:white;border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:white">
      <div id="modalTitle" style="font-weight:700">Nuevo anuncio</div>
      <button onclick="closeModal()" style="background:var(--off-white);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer">✕</button>
    </div>
    <div style="padding:20px">
      <div class="form-group"><label>Título *</label><input type="text" id="f_title" placeholder="Ej: ¡Nueva carta disponible!" style="width:100%"></div>
      <div class="form-group"><label>Descripción *</label><textarea id="f_desc" rows="4" placeholder="Cuéntale a tus clientes las novedades..." style="width:100%"></textarea></div>
      <div class="form-group">
        <label>Fotografía <span style="font-weight:400;color:var(--muted)">(opcional)</span></label>
        <div id="imgPreviewWrap" style="display:none;margin-bottom:8px">
          <img id="imgPreview" style="width:100%;height:140px;object-fit:cover;border-radius:10px">
          <button onclick="removeImage()" style="margin-top:6px;background:none;border:1px solid var(--danger);color:var(--danger);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.8rem">✕ Quitar foto</button>
        </div>
        <label id="imgLabel" style="display:flex;align-items:center;justify-content:center;height:90px;border:2px dashed var(--border);border-radius:10px;cursor:pointer;color:var(--muted);font-size:.85rem;flex-direction:column;gap:6px">
          📷 Toca para subir foto
          <input type="file" id="f_image" accept="image/*" style="display:none" onchange="previewImg(this)">
        </label>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px">
        <label class="switch"><input type="checkbox" id="f_active" checked><span class="slider"></span></label>
        <span style="font-size:.88rem">Publicar activo</span>
      </div>
      <div id="formMsg" style="display:none;padding:8px 12px;border-radius:8px;font-size:.85rem;margin-bottom:10px"></div>
      <button onclick="saveAnuncio()" class="btn-primary" style="width:100%;justify-content:center;padding:12px" id="saveBtn">Publicar anuncio</button>
    </div>
  </div>
</div>

<script src="../assets/js/app.js"></script>
<script>
var user = JSON.parse(localStorage.getItem('nuevaexpress_user')||'{}');
var adminUser = user;
if (!localStorage.getItem('nuevaexpress_token') || adminUser.role !== 'negocio') window.location.href = '/cliente/login.html';
document.getElementById('sidebarUser').textContent = user.name || '';
function getToken(){ return localStorage.getItem('nuevaexpress_token'); }
function esc(s){ var d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function doLogout(){ localStorage.clear(); window.location.href='/cliente/login.html'; }
function toggleSidebar(){ var s=document.querySelector('.sidebar');var o=document.getElementById('sidebarOverlay');if(s)s.classList.toggle('open');if(o)o.classList.toggle('open'); }

var editingId = null;
var uploadedImageUrl = null;

async function loadAnuncios() {
  document.getElementById('loadingEl').style.display = 'block';
  document.getElementById('noData').style.display = 'none';
  document.getElementById('anuncioList').innerHTML = '';
  var res = await fetch('/api/anuncios/mine', { headers:{ Authorization:'Bearer '+getToken() } });
  var data = await res.json();
  document.getElementById('loadingEl').style.display = 'none';
  var list = data.data || [];
  if (!list.length){ document.getElementById('noData').style.display='block'; return; }
  document.getElementById('anuncioList').innerHTML = list.map(function(a){
    var date = new Date(a.created_at).toLocaleDateString('es-GT',{day:'2-digit',month:'short',year:'numeric'});
    return '<div class="anuncio-card">' +
      (a.image_url ? '<img src="'+esc(a.image_url)+'" class="anuncio-img">' : '') +
      '<div class="anuncio-body">' +
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px">' +
          '<div style="font-weight:700;font-size:.95rem">'+esc(a.title)+'</div>' +
          '<span style="font-size:.72rem;padding:2px 10px;border-radius:20px;font-weight:700;'+(a.is_active?'background:#d1fae5;color:#065f46':'background:#fee2e2;color:#991b1b')+'">'+(a.is_active?'✅ Activo':'⛔ Inactivo')+'</span>' +
        '</div>' +
        '<div style="font-size:.85rem;color:var(--muted);margin-bottom:10px">'+esc(a.description)+'</div>' +
        '<div style="font-size:.75rem;color:var(--muted);margin-bottom:10px">📅 '+date+'</div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
          '<button onclick="openEdit('+JSON.stringify(a).replace(/"/g,'&quot;')+')" style="padding:6px 12px;font-size:.8rem;background:none;border:1.5px solid var(--blue);color:var(--blue);border-radius:var(--radius-sm);cursor:pointer">✏️ Editar</button>' +
          '<button onclick="toggleActive('+a.id+','+a.is_active+')" style="padding:6px 12px;font-size:.8rem;background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer">'+(a.is_active?'⛔ Desactivar':'✅ Activar')+'</button>' +
          '<button onclick="deleteAnuncio('+a.id+')" style="padding:6px 12px;font-size:.8rem;background:none;border:1.5px solid var(--danger);color:var(--danger);border-radius:var(--radius-sm);cursor:pointer">🗑️ Eliminar</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function openCreate() {
  editingId = null; uploadedImageUrl = null;
  document.getElementById('modalTitle').textContent = '📢 Nuevo anuncio';
  document.getElementById('f_title').value = '';
  document.getElementById('f_desc').value = '';
  document.getElementById('f_active').checked = true;
  document.getElementById('f_image').value = '';
  document.getElementById('imgPreviewWrap').style.display = 'none';
  document.getElementById('imgLabel').style.display = 'flex';
  document.getElementById('saveBtn').textContent = 'Publicar anuncio';
  document.getElementById('formMsg').style.display = 'none';
  document.getElementById('formModal').style.display = 'flex';
}

function openEdit(a) {
  editingId = a.id; uploadedImageUrl = a.image_url || null;
  document.getElementById('modalTitle').textContent = '✏️ Editar anuncio';
  document.getElementById('f_title').value = a.title || '';
  document.getElementById('f_desc').value = a.description || '';
  document.getElementById('f_active').checked = !!a.is_active;
  document.getElementById('f_image').value = '';
  if (a.image_url) {
    document.getElementById('imgPreview').src = a.image_url;
    document.getElementById('imgPreviewWrap').style.display = 'block';
    document.getElementById('imgLabel').style.display = 'none';
  } else {
    document.getElementById('imgPreviewWrap').style.display = 'none';
    document.getElementById('imgLabel').style.display = 'flex';
  }
  document.getElementById('saveBtn').textContent = 'Guardar cambios';
  document.getElementById('formMsg').style.display = 'none';
  document.getElementById('formModal').style.display = 'flex';
}

function closeModal() { document.getElementById('formModal').style.display = 'none'; }

function previewImg(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('imgPreview').src = e.target.result;
    document.getElementById('imgPreviewWrap').style.display = 'block';
    document.getElementById('imgLabel').style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}

function removeImage() {
  uploadedImageUrl = null;
  document.getElementById('f_image').value = '';
  document.getElementById('imgPreviewWrap').style.display = 'none';
  document.getElementById('imgLabel').style.display = 'flex';
}

function showMsg(text, isError) {
  var m = document.getElementById('formMsg');
  m.textContent = text;
  m.style.background = isError ? '#fdf0f0' : '#f0fdf4';
  m.style.color = isError ? 'var(--danger)' : '#16a34a';
  m.style.display = 'block';
}

async function saveAnuncio() {
  var title = document.getElementById('f_title').value.trim();
  var desc  = document.getElementById('f_desc').value.trim();
  if (!title || !desc) { showMsg('Título y descripción son requeridos', true); return; }

  var btn = document.getElementById('saveBtn');
  btn.textContent = 'Guardando...'; btn.disabled = true;

  // Subir imagen si hay una nueva
  var imageUrl = uploadedImageUrl;
  var imgFile = document.getElementById('f_image').files[0];
  if (imgFile) {
    var fakeId = editingId || Date.now();
    var formData = new FormData();
    formData.append('image', imgFile);
    // Subir directamente al endpoint general de imágenes
    var uploadRes = await fetch('/api/anuncios/'+(editingId||0)+'/imagen', {
      method: 'POST',
      headers: { Authorization: 'Bearer '+getToken() },
      body: formData
    });
    var uploadData = await uploadRes.json();
    if (uploadData.success) imageUrl = uploadData.data.url;
  }

  var payload = { title, description: desc, is_active: document.getElementById('f_active').checked ? 1 : 0 };
  if (imageUrl) payload.image_url = imageUrl;

  var url = editingId ? '/api/anuncios/'+editingId : '/api/anuncios';
  var method = editingId ? 'PUT' : 'POST';

  var res = await fetch(url, {
    method,
    headers: { 'Content-Type':'application/json', Authorization:'Bearer '+getToken() },
    body: JSON.stringify(payload)
  });
  var data = await res.json();
  btn.textContent = editingId ? 'Guardar cambios' : 'Publicar anuncio'; btn.disabled = false;

  if (data.success) { closeModal(); loadAnuncios(); }
  else showMsg(data.message||'Error al guardar', true);
}

async function toggleActive(id, current) {
  var res = await fetch('/api/anuncios/'+id, {
    method:'PUT',
    headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+getToken() },
    body: JSON.stringify({ is_active: current ? 0 : 1 })
  });
  var data = await res.json();
  if (data.success) loadAnuncios();
  else alert(data.message||'Error');
}

async function deleteAnuncio(id) {
  if (!confirm('¿Eliminar este anuncio?')) return;
  var res = await fetch('/api/anuncios/'+id, { method:'DELETE', headers:{ Authorization:'Bearer '+getToken() } });
  var data = await res.json();
  if (data.success) loadAnuncios();
  else alert(data.message||'Error');
}

loadAnuncios();
</script>
<script src="/assets/js/pwa.js"></script>
</body>
</html>
