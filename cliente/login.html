<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4A90D9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NuevaExpress">
<link rel="apple-touch-icon" href="/assets/img/logo.jpg">
<link rel="icon" type="image/jpeg" href="/assets/img/logo.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión — NuevaExpress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/main.css">
<style>
body { background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }
.auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
.auth-card {
  background: white; border-radius: 20px; padding: 40px;
  width: 100%; max-width: 420px; box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
}
.auth-logo { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 4px; }
.auth-logo span { color: var(--accent); }
.auth-subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 32px; }
.auth-card h2 { font-size: 1.5rem; margin-bottom: 4px; }
.auth-footer { text-align: center; margin-top: 20px; font-size: .9rem; color: var(--muted); }
.auth-footer a { color: var(--accent); font-weight: 600; }
.divider { text-align: center; color: var(--muted); font-size: .8rem; margin: 16px 0; position: relative; }
.divider::before { content:''; position:absolute; left:0; top:50%; width:40%; height:1px; background:var(--border); }
.divider::after  { content:''; position:absolute; right:0; top:50%; width:40%; height:1px; background:var(--border); }
.error-msg { background: #fdf0f0; border: 1px solid #f5c2c2; color: var(--danger); padding: 10px 14px; border-radius: var(--radius-sm); font-size: .9rem; margin-bottom: 16px; display: none; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="logo"><img src="../assets/img/logo.jpg" alt="NuevaExpress" style="height:38px;border-radius:8px"><span class="logo-text">Nueva<span>Express</span></span></a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><div class="logo" style="justify-content:center"><img src="../assets/img/logo.jpg" alt="NuevaExpress" style="height:48px;border-radius:10px"><span class="logo-text" style="font-size:1.2rem">Nueva<span>Express</span></span></div></div>
    <div class="auth-subtitle">Tu directorio de negocios local</div>
    <h2>Bienvenido de vuelta</h2>
    <p class="auth-subtitle" style="margin-bottom:20px">Ingresa a tu cuenta para continuar</p>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="tucorreo@ejemplo.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <div class="pw-wrap"><input type="password" id="password" placeholder="••••••••" autocomplete="current-password"><button type="button" class="pw-toggle" onclick="togglePw('password')" tabindex="-1">👁️</button></div>
    </div>

    <button class="btn-primary" style="width:100%;justify-content:center;padding:14px" onclick="doLogin()" id="loginBtn">
      Iniciar Sesión
    </button>

    <div class="auth-footer" style="margin-top:24px">
      ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
    </div>
    <div class="auth-footer">
      <a href="olvide-contrasena.html" style="color:var(--muted)">¿Olvidaste tu contraseña?</a>
    </div>
    <div class="auth-footer">
      <a href="/">← Volver al directorio</a>
    </div>
  </div>
</div>

<script>

function togglePw(id) {
  var inp = document.getElementById(id);
  if (!inp) return;
  var btn = inp.parentElement.querySelector('.pw-toggle');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  if (btn) btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
}
const API = '/api';

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const errEl    = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  if (!email || !password) { showError('Completa todos los campos'); return; }

  btn.textContent = 'Ingresando...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!data.success) { showError(data.message || 'Credenciales incorrectas'); return; }

    // Store token in localStorage
    localStorage.setItem('nuevaexpress_token', data.data.token);
    localStorage.setItem('nuevaexpress_user', JSON.stringify(data.data.user));

    // Redirect with token in hash (backup in case localStorage doesn't persist)
    var role = data.data.user.role;
    var token = data.data.token;
    var userStr = encodeURIComponent(JSON.stringify(data.data.user));

    if (role === 'admin')           window.location.href = '/admin/index.html#tk=' + token + '&us=' + userStr;
    else if (role === 'negocio')    window.location.href = '/negocio/index.html#tk=' + token + '&us=' + userStr;
    else if (role === 'repartidor') window.location.href = '/repartidor/index.html#tk=' + token + '&us=' + userStr;
    else                            window.location.href = '/cliente/index.html#tk=' + token + '&us=' + userStr;

  } catch(e) {
    showError('Error de conexión. Intenta de nuevo.');
  } finally {
    btn.textContent = 'Iniciar Sesión';
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

// Allow Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
<script src="/assets/js/pwa.js"></script>
</body>
</html>
