<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4A90D9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anuncios — NuevaExpress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/main.css">
<style>
.anuncio-card{background:white;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.anuncio-img{width:100%;height:180px;object-fit:cover;display:block;cursor:zoom-in}
.anuncio-body{padding:16px}
.anuncio-biz{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.anuncio-biz img{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--border)}
</style>
</head>
<body>
<button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo"><img src="/assets/img/logo.jpg" alt="NuevaExpress"><span class="logo-text">Nueva<span>Express</span></span></div>
      <div style="color:rgba(255,255,255,.4);font-size:.8rem;margin-top:4px" id="sidebarUser"></div>
    </div>
    <ul class="sidebar-nav">
      <li><a href="index.html">📋 Mis Pedidos</a></li>
      <li><a href="/index.html">🏪 Directorio</a></li>
      <li><a href="promociones.html">🏷️ Promociones</a></li>
      <li><a href="anuncios.html" class="active">📢 Anuncios</a></li>
      <li><a href="reportes.html">📊 Mis Reportes</a></li>
      <li><a href="perfil.html">👤 Mi Perfil</a></li>
      <li><a href="#" id="updateAppBtn" onclick="forceUpdate()" style="color:rgba(255,255,255,.5);font-size:.82rem">🔄 Actualizar app</a></li>
      <li style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.15)"><a href="#" onclick="doLogout()">🚪 Cerrar Sesión</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>📢 Anuncios</h1>
      <p>Novedades de tus negocios favoritos</p>
    </div>

    <div id="loadingEl" style="text-align:center;padding:40px"><div class="spinner" style="margin:auto"></div></div>
    <div id="noData" style="display:none;text-align:center;padding:40px;color:var(--muted)">No hay anuncios disponibles por el momento.</div>
    <div id="anuncioList"></div>
  </main>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;align-items:center;justify-content:center;padding:16px">
  <img id="lightboxImg" style="max-width:100%;max-height:90vh;border-radius:10px;object-fit:contain">
</div>

<script src="../assets/js/app.js"></script>
<script>
var user = JSON.parse(localStorage.getItem('nuevaexpress_user')||'{}');
if (!localStorage.getItem('nuevaexpress_token') || user.role !== 'cliente') window.location.href = '/cliente/login.html';
document.getElementById('sidebarUser').textContent = user.name || '';
function getToken(){ return localStorage.getItem('nuevaexpress_token'); }
function esc(s){ var d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function doLogout(){ localStorage.clear(); window.location.href='/cliente/login.html'; }
function toggleSidebar(){ var s=document.querySelector('.sidebar');var o=document.getElementById('sidebarOverlay');if(s)s.classList.toggle('open');if(o)o.classList.toggle('open'); }

async function loadAnuncios() {
  var res = await fetch('/api/anuncios', { headers:{ Authorization:'Bearer '+getToken() } });
  var data = await res.json();
  document.getElementById('loadingEl').style.display = 'none';
  var list = data.data || [];
  if (!list.length){ document.getElementById('noData').style.display='block'; return; }
  document.getElementById('anuncioList').innerHTML = list.map(function(a){
    var date = new Date(a.created_at).toLocaleDateString('es-GT',{day:'2-digit',month:'long',year:'numeric'});
    return '<div class="anuncio-card">' +
      (a.image_url ? '<img src="'+esc(a.image_url)+'" class="anuncio-img" onclick="openLightbox(\''+esc(a.image_url)+'\')">' : '') +
      '<div class="anuncio-body">' +
        '<div class="anuncio-biz">' +
          (a.business_logo ? '<img src="'+esc(a.business_logo)+'">' : '<div style="width:32px;height:32px;border-radius:50%;background:var(--off-white);display:flex;align-items:center;justify-content:center;font-size:1rem">🏪</div>') +
          '<span style="font-weight:600;font-size:.82rem">'+esc(a.business_name)+'</span>' +
        '</div>' +
        '<div style="font-weight:700;font-size:1rem;margin-bottom:6px">'+esc(a.title)+'</div>' +
        '<div style="font-size:.88rem;color:var(--muted);line-height:1.6;margin-bottom:8px">'+esc(a.description)+'</div>' +
        '<div style="font-size:.75rem;color:var(--muted)">📅 '+date+'</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').style.display = 'flex';
}

loadAnuncios();
</script>
<script src="/assets/js/pwa.js"></script>
</body>
</html>
