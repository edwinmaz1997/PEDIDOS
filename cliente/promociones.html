<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4A90D9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Promociones — NuevaExpress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/main.css">
<style>
.promos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.pm-card{background:white;border-radius:14px;overflow:hidden;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.07);border:1px solid var(--border);transition:transform .15s,box-shadow .15s}
.pm-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.pm-img{width:100%;height:150px;object-fit:cover;display:block}
.pm-no-img{width:100%;height:100px;background:linear-gradient(135deg,#F5C518,#FF8C42);display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.pm-body{padding:12px 14px}
.pm-biz{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.pm-biz img{width:26px;height:26px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border)}
.pm-biz span{font-size:.75rem;font-weight:600;color:var(--muted)}
.pm-title{font-weight:700;font-size:.9rem;color:var(--navy);margin-bottom:5px;line-height:1.3}
.pm-excerpt{font-size:.8rem;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pm-badge{display:inline-block;background:#fef3c7;color:#92400e;font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:700;margin-top:7px}
/* Modal */
.promo-item-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--off-white);border-radius:8px;margin-bottom:8px}
.item-left{display:flex;align-items:center;gap:10px}
.item-check{width:20px;height:20px;border-radius:4px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.item-check.checked{background:var(--blue);border-color:var(--blue);color:white}
.item-name{font-size:.88rem;font-weight:600}
.item-prices{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.original{text-decoration:line-through;color:var(--muted);font-size:.8rem}
.promo-price{font-weight:700;color:var(--success);font-size:.9rem}
.saving{background:#d1fae5;color:#065f46;padding:2px 6px;border-radius:20px;font-size:.7rem;font-weight:700}
@media(max-width:480px){.promos-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo"><img src="/assets/img/logo.jpg" alt="NuevaExpress"><span class="logo-text">Nueva<span>Express</span></span></div>
      <div style="color:rgba(255,255,255,.4);font-size:.75rem;margin-top:4px" id="sidebarUser"></div>
    </div>
    <ul class="sidebar-nav">
      <li><a href="index.html">📋 Mis Pedidos</a></li>
      <li><a href="/index.html">🏪 Directorio</a></li>
      <li><a href="promociones.html" class="active">🏷️ Promociones</a></li>
      <li><a href="anuncios.html">📢 Anuncios</a></li>
      <li><a href="reportes.html">📊 Mis Reportes</a></li>
      <li><a href="perfil.html">👤 Mi Perfil</a></li>
      <li><a href="#" id="updateAppBtn" onclick="forceUpdate()" style="color:rgba(255,255,255,.5);font-size:.82rem">🔄 Actualizar app</a></li>
      <li style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.15)"><a href="#" onclick="doLogout()">🚪 Cerrar Sesión</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="page-header" style="margin-bottom:20px">
      <h1>🏷️ Promociones vigentes</h1>
      <p>Ofertas activas de los negocios</p>
    </div>
    <div id="promoList" class="promos-grid"></div>
  </main>
</div>

<!-- Modal detalle promoción -->
<div id="promoModal" onclick="if(event.target===this)closeModal()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:flex-end;justify-content:center">
  <div style="background:white;border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)">
    <div style="position:sticky;top:0;background:white;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);z-index:1">
      <div id="pmBiz" style="display:flex;align-items:center;gap:8px"></div>
      <button onclick="closeModal()" style="background:var(--off-white);border:none;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1.1rem">✕</button>
    </div>
    <div id="pmImg"></div>
    <div style="padding:16px 20px">
      <div id="pmTitle" style="font-weight:800;font-size:1.1rem;color:var(--navy);margin-bottom:6px"></div>
      <div id="pmDesc" style="font-size:.88rem;color:var(--muted);line-height:1.6;margin-bottom:10px"></div>
      <div id="pmDates" style="font-size:.75rem;color:var(--muted);margin-bottom:14px"></div>
      <div id="pmItems"></div>
      <div id="pmAction" style="margin-top:14px"></div>
    </div>
  </div>
</div>

<script src="../assets/js/app.js"></script>
<script>
(function(){var h=window.location.hash;if(h&&h.indexOf('tk=')!==-1){var p=h.substring(1).split('&'),tk='',us='';p.forEach(function(x){if(x.indexOf('tk=')===0)tk=x.substring(3);if(x.indexOf('us=')===0)us=decodeURIComponent(x.substring(3));});if(tk){localStorage.setItem('nuevaexpress_token',tk);if(us)localStorage.setItem('nuevaexpress_user',us);history.replaceState(null,'',window.location.pathname);}}})();

var user = JSON.parse(localStorage.getItem('nuevaexpress_user')||'{}');
if(!localStorage.getItem('nuevaexpress_token')) window.location.href='/cliente/login.html';
document.getElementById('sidebarUser').textContent = user.name||'';

var selectedItems = {};
var allPromos = [];

function fmtDate(s){if(!s)return '';var p=s.split(' ');var d=p[0].split('-');var t=p[1]?p[1].substring(0,5):'';return d[2]+'/'+d[1]+'/'+d[0]+(t?' '+t:'');}

async function init() {
  var res = await APP.get('/promotions');
  allPromos = res?.data || [];
  var container = document.getElementById('promoList');
  if (!allPromos.length) {
    container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">No hay promociones vigentes en este momento.</div>';
    return;
  }
  container.innerHTML = allPromos.map(function(p) {
    selectedItems[p.id] = {};
    var logo = p.business_logo ? '<img src="'+APP.esc(p.business_logo)+'">' : '<div style="width:26px;height:26px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:.8rem">🏪</div>';
    var imgHtml = p.image_url ? '<img src="'+APP.esc(p.image_url)+'" class="pm-img">' : '<div class="pm-no-img">🏷️</div>';
    var minPrice = (p.items||[]).reduce(function(mn,i){ return Math.min(mn,parseFloat(i.promo_price||0)); }, Infinity);
    var badge = isFinite(minPrice) && minPrice > 0 ? 'Desde Q'+minPrice.toFixed(2) : '¡Oferta especial!';
    return '<div class="pm-card" onclick="openPromo('+p.id+')">' +
      imgHtml +
      '<div class="pm-body">' +
        '<div class="pm-biz">'+logo+'<span>'+APP.esc(p.business_name)+'</span></div>' +
        '<div class="pm-title">'+APP.esc(p.title)+'</div>' +
        '<div class="pm-excerpt">'+APP.esc(p.description)+'</div>' +
        '<span class="pm-badge">'+badge+'</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

function openPromo(promoId) {
  var p = allPromos.find(function(x){ return x.id == promoId; });
  if (!p) return;
  selectedItems[p.id] = {};

  var logo = p.business_logo ? '<img src="'+APP.esc(p.business_logo)+'" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--border)">' : '<div style="width:32px;height:32px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center">🏪</div>';
  document.getElementById('pmBiz').innerHTML = logo + '<span style="font-weight:600;font-size:.85rem">'+APP.esc(p.business_name)+'</span>';
  document.getElementById('pmImg').innerHTML = p.image_url ? '<img src="'+APP.esc(p.image_url)+'" style="width:100%;max-height:220px;object-fit:cover;display:block">' : '';
  document.getElementById('pmTitle').textContent = p.title;
  document.getElementById('pmDesc').textContent = p.description;
  document.getElementById('pmDates').textContent = '📅 '+fmtDate(p.starts_at)+' → '+fmtDate(p.ends_at);

  var isService = p.business_type === 'servicios';
  document.getElementById('pmItems').innerHTML = (p.items||[]).map(function(item) {
    var saving = (parseFloat(item.original_price) - parseFloat(item.promo_price)).toFixed(2);
    return '<div class="promo-item-row">' +
      '<div class="item-left">' +
        (isService ? '' : '<div class="item-check" id="chk-'+p.id+'-'+item.id+'" onclick="toggleItem(\''+p.id+'\','+JSON.stringify(item).replace(/'/g,"\\'")+')" >✓</div>') +
        '<div class="item-name">'+APP.esc(item.product_name)+'</div>' +
      '</div>' +
      '<div class="item-prices">' +
        '<span class="original">Q'+parseFloat(item.original_price).toFixed(2)+'</span>' +
        '<span class="promo-price">Q'+parseFloat(item.promo_price).toFixed(2)+'</span>' +
        '<span class="saving">-Q'+saving+'</span>' +
      '</div>' +
    '</div>';
  }).join('');

  // Marcar items por defecto
  (p.items||[]).forEach(function(item) {
    selectedItems[p.id][item.id] = item;
    var chk = document.getElementById('chk-'+p.id+'-'+item.id);
    if (chk) chk.classList.add('checked');
  });

  if (isService) {
    var wa = (p.whatsapp||p.phone||'').replace(/\D/g,'');
    var msg = encodeURIComponent('Hola '+p.business_name+'! Vi tu promoción "'+p.title+'" en NuevaExpress.');
    document.getElementById('pmAction').innerHTML = wa
      ? '<a href="https://wa.me/'+wa+'?text='+msg+'" target="_blank" class="btn-primary" style="width:100%;justify-content:center;padding:13px;text-decoration:none;display:flex;background:#25D366">💬 Contactar por WhatsApp</a>'
      : '<p style="text-align:center;color:var(--muted);font-size:.85rem">Contáctanos directamente para aprovechar esta oferta</p>';
  } else {
    document.getElementById('pmAction').innerHTML = '<button onclick="pedirPromo('+p.id+','+p.business_id+')" class="btn-primary" style="width:100%;justify-content:center;padding:13px">🛒 Pedir con estos productos</button>';
  }

  document.getElementById('promoModal').style.display = 'flex';
}

function closeModal() { document.getElementById('promoModal').style.display = 'none'; }

function toggleItem(promoId, item) {
  var chk = document.getElementById('chk-'+promoId+'-'+item.id);
  if (selectedItems[promoId][item.id]) {
    delete selectedItems[promoId][item.id];
    if (chk) chk.classList.remove('checked');
  } else {
    selectedItems[promoId][item.id] = item;
    if (chk) chk.classList.add('checked');
  }
}

function pedirPromo(promoId, businessId) {
  var items = Object.values(selectedItems[promoId] || {});
  if (!items.length) { APP.toast('Selecciona al menos un producto', 'error'); return; }
  var cartItems = items.map(function(i){ return { id: i.product_id, name: i.product_name, price: i.promo_price, qty: 1 }; });
  sessionStorage.setItem('promo_cart', JSON.stringify({ business_id: businessId, items: cartItems }));
  window.location.href = '/cliente/pedido.html?business_id=' + businessId + '&from_promo=1';
}

function doLogout(){ localStorage.clear(); window.location.href='/cliente/login.html'; }
function toggleSidebar(){ var s=document.querySelector('.sidebar');var o=document.getElementById('sidebarOverlay');if(s)s.classList.toggle('open');if(o)o.classList.toggle('open'); }

init();
</script>
<script src="/assets/js/pwa.js"></script>
</body>
</html>
