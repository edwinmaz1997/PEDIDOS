<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4A90D9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NuevaExpress">
<link rel="apple-touch-icon" href="/assets/img/logo.jpg">
<link rel="icon" type="image/jpeg" href="/assets/img/logo.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mis Pedidos — NuevaExpress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/main.css">
<style>
.order-card { background:white; border-radius:var(--radius); border:1px solid var(--border); padding:20px; margin-bottom:16px; }
.order-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
.order-num { font-family:'Syne',sans-serif; font-weight:700; font-size:1.05rem; }
.order-biz { color:var(--muted); font-size:.9rem; }
.order-items { margin:12px 0; border-top:1px solid var(--border); padding-top:12px; }
.order-item-row { display:flex; justify-content:space-between; font-size:.9rem; margin-bottom:4px; }
.order-total-row { display:flex; justify-content:space-between; font-weight:700; border-top:1px solid var(--border); padding-top:8px; margin-top:8px; }
.order-response { background:var(--off-white); border-radius:var(--radius-sm); padding:12px; margin-top:12px; font-size:.9rem; }
.order-response strong { display:block; margin-bottom:4px; }
.order-actions { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
.status-timeline { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.status-dot { font-size:.75rem; padding:3px 10px; border-radius:20px; background:var(--off-white); color:var(--muted); }
.status-dot.done { background:#d4edda; color:#155724; }
.filter-tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
.filter-tab { padding:7px 16px; border-radius:20px; border:1.5px solid var(--border); background:white; cursor:pointer; font-size:.85rem; font-family:'DM Sans',sans-serif; transition:var(--transition); }
.filter-tab.active { background:var(--charcoal); color:white; border-color:var(--charcoal); }
#promoCarousel::-webkit-scrollbar{display:none}
.promo-slide{flex-shrink:0;width:210px;border-radius:14px;overflow:hidden;scroll-snap-align:start;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.12);transition:transform .2s;background:#1a1a2e}
.promo-slide:hover{transform:translateY(-2px)}
.promo-slide-img{width:100%;height:110px;object-fit:cover;display:block}
.promo-slide-nophoto{width:100%;height:110px;background:linear-gradient(135deg,#F5C518,#FF8C42);display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.promo-slide-body{padding:10px 12px}
.promo-slide-biz{font-size:.68rem;color:rgba(255,255,255,.6);margin-bottom:3px;display:flex;align-items:center;gap:5px}
.promo-slide-biz img{width:18px;height:18px;border-radius:50%;object-fit:cover}
.promo-slide-title{font-weight:700;font-size:.82rem;color:white;line-height:1.3;margin-bottom:5px}
.promo-slide-badge{background:rgba(255,255,255,.15);color:white;font-size:.68rem;padding:2px 8px;border-radius:20px;display:inline-block}
</style>
</head>
<body>
<button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="dashboard-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo"><img src="/assets/img/logo.jpg" alt="NuevaExpress" style="height:38px;border-radius:8px"><span class="logo-text">Nueva<span>Express</span></span></div>
      <div style="color:rgba(255,255,255,.4);font-size:.8rem;margin-top:4px" id="sidebarUser">Cliente</div>
    </div>
    <ul class="sidebar-nav">
      <li><a href="index.html" class="active">📋 Mis Pedidos</a></li>
      <li><a href="/index.html">🏪 Directorio</a></li>
      <li><a href="promociones.html">🏷️ Promociones</a></li>
      <li><a href="reportes.html">📊 Mis Reportes</a></li>
      <li><a href="perfil.html">👤 Mi Perfil</a></li>
      <li><a href="#" id="updateAppBtn" onclick="forceUpdate()" style="color:rgba(255,255,255,.5);font-size:.82rem">🔄 Actualizar app</a></li>
      <li style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.15)"><a href="#" onclick="doLogout()">🚪 Cerrar Sesión</a></li>
    </ul>
  </aside>

  <!-- Main -->
  <main class="main-content">

    <!-- Carrusel de Promociones -->
    <div id="promoCarouselWrap" style="display:none;margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-weight:700;font-size:.95rem;color:var(--navy)">🏷️ Promociones activas</div>
        <a href="promociones.html" style="font-size:.8rem;color:var(--blue);text-decoration:none">Ver todas →</a>
      </div>
      <div id="promoCarousel" style="display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none"></div>
    </div>

    <div class="page-header">
      <h1>Mis Pedidos</h1>
      <p>Historial y estado de tus pedidos</p>
    </div>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap">
      <div style="font-weight:700;font-size:1rem;color:var(--navy);flex:1">Mis Pedidos</div>
      <select id="statusFilter" onchange="loadOrders(this.value)" style="padding:8px 14px;border:1.5px solid var(--border);border-radius:20px;font-family:'DM Sans',sans-serif;font-size:.85rem;background:white;cursor:pointer;outline:none">
        <option value="">📋 Todos</option>
        <option value="pendiente">⏳ Pendientes</option>
        <option value="aceptado">✅ Aceptados</option>
        <option value="en_preparacion">👨‍🍳 En preparación</option>
        <option value="listo">📦 Listos</option>
        <option value="en_camino">🛵 En camino</option>
        <option value="entregado">✔ Entregados</option>
        <option value="cancelado">✕ Cancelados</option>
      </select>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="searchQ" placeholder="🔍 Buscar por negocio o #pedido..." oninput="filterOrders()" style="flex:1;padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none">
    </div>
    <div id="ordersContainer"><div class="loading-state"><div class="spinner"></div></div></div>
    <div class="pagination" id="pagination"></div>

    <a href="/index.html" class="btn-primary" style="display:inline-flex;margin-top:16px">
      🛒 Hacer un nuevo pedido
    </a>
  </main>
</div>

<script>
const API = '/api';
const user  = JSON.parse(localStorage.getItem('nuevaexpress_user') || '{}');
if (!localStorage.getItem('nuevaexpress_token')) window.location.href = '/cliente/login.html';
if (user.role && user.role !== 'cliente') window.location.href = `/${user.role}/index.html`;

document.getElementById('sidebarUser').textContent = user.name || 'Cliente';

const statusLabels = {
  pendiente:'⏳ Pendiente', aceptado:'✅ Aceptado', en_preparacion:'👨‍🍳 En preparación',
  listo:'📦 Listo', en_camino:'🛵 En camino', entregado:'✔ Entregado', cancelado:'✕ Cancelado'
};
const statusBadge = {
  pendiente:'badge-pending', aceptado:'badge-accepted', en_preparacion:'badge-delivery',
  listo:'badge-active', en_camino:'badge-delivery', entregado:'badge-done', cancelado:'badge-cancel'
};

var allOrders = [];
var filteredOrders = [];
var currentStatus = '';
var page = 1;
var perPage = 8;

async function loadOrders(status = '', tabBtn = null) {
  // Sincronizar dropdown si se llama externamente
  var sel = document.getElementById('statusFilter');
  if (sel && sel.value !== status) sel.value = status;
  if (tabBtn) {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tabBtn.classList.add('active');
  }
  currentStatus = status;
  const container = document.getElementById('ordersContainer');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
  try {
    const res = await fetch(`${API}/orders`, { headers: { Authorization: 'Bearer ' + localStorage.getItem('nuevaexpress_token') } });
    const data = await res.json();
    allOrders = data.data?.orders || [];
    page = 1;
    filterOrders();
  } catch(e) { container.innerHTML = '<div class="empty-state"><p>Error cargando pedidos.</p></div>'; }
}

function filterOrders() {
  var q = (document.getElementById('searchQ')?.value || '').toLowerCase();
  filteredOrders = allOrders.filter(function(o) {
    var mS = !currentStatus || o.status === currentStatus;
    var mQ = !q || (o.order_number||'').toLowerCase().includes(q) || (o.business_name||'').toLowerCase().includes(q);
    return mS && mQ;
  });
  page = 1;
  renderPage();
}

function renderPage() {
  var container = document.getElementById('ordersContainer');
  var pageData = filteredOrders.slice((page-1)*perPage, page*perPage);
  if (!filteredOrders.length) { container.innerHTML = '<div class="empty-state"><p>No hay pedidos.</p></div>'; renderPag(0); return; }
  container.innerHTML = pageData.map(renderOrder).join('');
  renderPag(filteredOrders.length);
  startTimers();
}

function renderPag(total) {
  var pages = Math.ceil(total/perPage);
  var el = document.getElementById('pagination');
  if (!el||pages<=1){if(el)el.innerHTML='';return;}
  var html='<button class="page-btn" onclick="goPage('+(page-1)+')" '+(page===1?'disabled':'')+'>‹</button>';
  for(var i=1;i<=pages;i++){
    if(i===1||i===pages||(i>=page-2&&i<=page+2))html+='<button class="page-btn '+(i===page?'active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
    else if(i===page-3||i===page+3)html+='<span class="page-info">…</span>';
  }
  html+='<button class="page-btn" onclick="goPage('+(page+1)+')" '+(page===pages?'disabled':'')+'>›</button>';
  el.innerHTML=html;
}
function goPage(p){var pages=Math.ceil(filteredOrders.length/perPage);if(p<1||p>pages)return;page=p;renderPage();window.scrollTo(0,0);}

function startTimers() {
  document.querySelectorAll('[data-ts][data-mins]').forEach(function(el) {
    var id = el.id.replace('timer-', '');
    var acceptedAt = el.dataset.ts ? parseInt(el.dataset.ts)*1000 : new Date(el.dataset.started.replace(' ','T')+'Z').getTime();
    var totalMs = parseInt(el.dataset.mins) * 60000;
    function tick() {
      var now = Date.now(), elapsed = now - acceptedAt, remaining = totalMs - elapsed;
      var cd = document.getElementById('countdown-' + id);
      var pr = document.getElementById('progress-' + id);
      var lb = document.getElementById('timer-label-' + id);
      if (!cd) return;
      if (remaining <= 0) {
        cd.textContent = '⏰'; cd.style.color = '#dc2626';
        if (pr) { pr.style.width = '100%'; pr.style.background = 'linear-gradient(90deg,#22c55e,#16a34a)'; }
        if (lb) lb.textContent = '🙏 Perdón por el atraso, tu pedido estará listo pronto';
        return;
      }
      var pct = Math.min(100, (elapsed / totalMs) * 100);
      var mins = Math.floor(remaining / 60000);
      var secs = Math.floor((remaining % 60000) / 1000);
      if (pr) pr.style.width = pct + '%';
      cd.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
      if (lb) lb.textContent = 'Listo en aproximadamente ' + mins + ' min' + (mins !== 1 ? 's' : '');
      setTimeout(tick, 1000);
    }
    tick();
  });
}

function renderOrder(o) {
  const items = (o.items || []).map(i => {
    var basePrice = parseFloat(i.unit_price) || 0;
    var notesHtml = '';
    if (i.notes) {
      i.notes.split(' | ').forEach(function(part) {
        if (part.startsWith('Extras:')) {
          part.replace('Extras: ', '').split(', ').forEach(function(ep) {
            var m = ep.match(/^(.+?)\s+\+Q([\d.]+)$/);
            if (m) {
              var ePrice = parseFloat(m[2]) || 0;
              basePrice -= ePrice;
              notesHtml += `<div style="display:flex;justify-content:space-between;font-size:.72rem;color:var(--accent);margin-top:1px"><span><strong>Extra:</strong> ${esc(m[1])}</span><span>+Q${(ePrice*i.quantity).toFixed(2)}</span></div>`;
            }
          });
        } else {
          var colonIdx = part.indexOf(': ');
          if (colonIdx > -1) {
            notesHtml += `<div style="font-size:.72rem;color:#16a34a;margin-top:1px"><strong>${esc(part.substring(0,colonIdx))}:</strong> ${esc(part.substring(colonIdx+2))}</div>`;
          }
        }
      });
    }
    return `<div class="order-item-row"><span>${esc(i.product_name)} x${i.quantity}</span>${i.unit_price ? `<span>Q${(basePrice*i.quantity).toFixed(2)}</span>` : ''}</div>${notesHtml}`;
  }).join('');
  return `
    <div class="order-card">
      <div class="order-top">
        <div>
          <div class="order-num">${esc(o.order_number)}</div>
          <div class="order-biz">🏪 ${esc(o.business_name || '')}</div>
          <div style="font-size:.8rem;color:var(--muted);margin-top:2px">${new Date(o.created_at).toLocaleString('es-GT')}</div>
        </div>
        <span class="badge ${statusBadge[o.status] || 'badge-pending'}">${statusLabels[o.status] || o.status}</span>
      </div>
      ${items ? `<div class="order-items">${items}<div class="order-total-row"><span>Total</span><span>Q${parseFloat(o.total).toFixed(2)}</span></div></div>` : ''}
      ${o.notes ? `<div style="font-size:.85rem;color:var(--muted);margin-top:8px">📝 ${esc(o.notes)}</div>` : ''}
      ${o.boleta_url ? `<div style="margin-top:8px;display:flex;align-items:center;gap:10px;background:#f5f3ff;border:1.5px solid #c4b5fd;border-radius:8px;padding:10px">
        <a href="${esc(o.boleta_url)}" target="_blank" style="flex-shrink:0">
          <img src="${esc(o.boleta_url)}" style="width:48px;height:48px;object-fit:cover;border-radius:6px;cursor:zoom-in">
        </a>
        <div>
          <div style="font-size:.8rem;font-weight:700;color:#7c3aed">📸 Tu boleta</div>
          <a href="${esc(o.boleta_url)}" target="_blank" style="font-size:.75rem;color:#7c3aed;text-decoration:underline">Ver imagen completa</a>
        </div>
      </div>` : ''}
      ${o.business_response ? `<div class="order-response"><strong>Respuesta del negocio:</strong> ${esc(o.business_response)}</div>` : ''}
      ${o.estimated_time && o.preparation_started_at && o.status === 'en_preparacion' ? `
        <div id="timer-${o.id}" data-ts="${o.prep_ts}" data-started="${o.preparation_started_at}" data-mins="${o.estimated_time}" style="margin-top:10px;background:linear-gradient(135deg,#eaf2fb,#f0f7ff);border:1.5px solid #bfdbfe;border-radius:10px;padding:12px 16px">
          <div style="font-size:.75rem;font-weight:700;color:#1e40af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">⏱️ Tiempo de preparación</div>
          <div style="display:flex;align-items:center;gap:12px">
            <div style="flex:1;background:#dbeafe;border-radius:20px;height:8px;overflow:hidden">
              <div id="progress-${o.id}" style="height:100%;background:linear-gradient(90deg,#3b82f6,#1d4ed8);border-radius:20px;transition:width .5s ease;width:0%"></div>
            </div>
            <div id="countdown-${o.id}" style="font-size:1.1rem;font-weight:800;color:#1e40af;min-width:60px;text-align:right">--:--</div>
          </div>
          <div id="timer-label-${o.id}" style="font-size:.75rem;color:#3b82f6;margin-top:4px">Calculando...</div>
        </div>
      ` : o.estimated_time ? `<div style="font-size:.83rem;color:var(--muted);margin-top:6px">⏱️ Tiempo estimado: ~${o.estimated_time} min</div>` : ''}
      <div class="order-actions">
        <a href="pedido-detalle.html?id=${o.id}" class="btn-ghost" style="font-size:.85rem;padding:7px 14px">💬 Ver detalle y chat</a>
        ${o.status === 'entregado' && !o.from_promo ? `<button class="btn-ghost" style="font-size:.85rem;padding:7px 14px" onclick="reorder(${o.business_id},${JSON.stringify(o.items||[]).replace(/"/g,'&quot;')},${JSON.stringify(o.delivery_type||'pickup').replace(/"/g,'&quot;')},${JSON.stringify(o.delivery_address||'').replace(/"/g,'&quot;')})">🔁 Pedir de nuevo</button>` : ''}
      </div>
    </div>
  `;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function doLogout() { localStorage.clear(); window.location.href = '/cliente/login.html'; }

function reorder(businessId, items, deliveryType, deliveryAddress) {
  // Normalizar items para incluir unit_price
  var normalizedItems = (items || []).map(function(i) {
    return { product_id: i.product_id, product_name: i.product_name, quantity: i.quantity, unit_price: i.unit_price };
  });
  localStorage.setItem('nuevaexpress_reorder', JSON.stringify({ items: normalizedItems, deliveryType, deliveryAddress }));
  window.location.href = '/cliente/pedido.html?business=' + businessId + '&reorder=1';
}

async function loadPromos() {
  try {
    var res = await fetch(API + '/promotions', { headers: { Authorization: 'Bearer ' + localStorage.getItem('nuevaexpress_token') } });
    var data = await res.json();
    var promos = data.data || [];
    if (!promos.length) return;
    var carousel = document.getElementById('promoCarousel');
    carousel.innerHTML = promos.map(function(p) {
      var photoHtml = p.image_url ? '<img src="'+p.image_url+'" class="promo-slide-img">' : '<div class="promo-slide-nophoto">🏷️</div>';
      var bizLogo = p.business_logo ? '<img src="'+p.business_logo+'">' : '';
      var minPrice = (p.items||[]).reduce(function(mn,i){ return Math.min(mn, parseFloat(i.promo_price||0)); }, Infinity);
      var priceLabel = isFinite(minPrice) && minPrice > 0 ? 'Desde Q'+minPrice.toFixed(2) : '¡Oferta especial!';
      return '<div class="promo-slide" onclick="window.location.href=\'promociones.html\'">' +
        photoHtml +
        '<div class="promo-slide-body">' +
          '<div class="promo-slide-biz">'+bizLogo+p.business_name+'</div>' +
          '<div class="promo-slide-title">'+p.title+'</div>' +
          '<span class="promo-slide-badge">'+priceLabel+'</span>' +
        '</div>' +
      '</div>';
    }).join('');
    document.getElementById('promoCarouselWrap').style.display = 'block';
  } catch(e) {}
}

loadOrders();
loadPromos();
// Poll every 30s for status updates
setInterval(() => loadOrders(document.querySelector('.filter-tab.active')?.dataset?.status || ''), 30000);
</script>

<script>
  // Recover token from URL hash if localStorage is empty
  (function() {
    var hash = window.location.hash;
    if (hash && hash.indexOf('tk=') !== -1) {
      var parts = hash.substring(1).split('&');
      var tk = '', us = '';
      parts.forEach(function(p) {
        if (p.indexOf('tk=') === 0) tk = p.substring(3);
        if (p.indexOf('us=') === 0) us = decodeURIComponent(p.substring(3));
      });
      if (tk) {
        localStorage.setItem('nuevaexpress_token', tk);
        if (us) localStorage.setItem('nuevaexpress_user', us);
        // Clean URL
        history.replaceState(null, '', window.location.pathname);
      }
    }
  })();

function toggleSidebar() {
  var sidebar = document.querySelector('.sidebar');
  var overlay = document.getElementById('sidebarOverlay');
  if (sidebar) sidebar.classList.toggle('open');
  if (overlay) overlay.classList.toggle('open');
}
</script>

<script src="/assets/js/pwa.js"></script>
</body>
</html>
