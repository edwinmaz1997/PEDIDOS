<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión — PedidosGT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/main.css">
<style>
body { background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }
.auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
.auth-card {
  background: white; border-radius: 20px; padding: 40px;
  width: 100%; max-width: 420px; box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
}
.auth-logo { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 4px; }
.auth-logo span { color: var(--accent); }
.auth-subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 32px; }
.auth-card h2 { font-size: 1.5rem; margin-bottom: 4px; }
.auth-footer { text-align: center; margin-top: 20px; font-size: .9rem; color: var(--muted); }
.auth-footer a { color: var(--accent); font-weight: 600; }
.divider { text-align: center; color: var(--muted); font-size: .8rem; margin: 16px 0; position: relative; }
.divider::before { content:''; position:absolute; left:0; top:50%; width:40%; height:1px; background:var(--border); }
.divider::after  { content:''; position:absolute; right:0; top:50%; width:40%; height:1px; background:var(--border); }
.role-toggle { display: flex; gap: 8px; margin-bottom: 24px; }
.role-btn { flex: 1; padding: 9px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: white; cursor: pointer; font-family: 'DM Sans',sans-serif; font-size: .85rem; font-weight: 500; transition: var(--transition); }
.role-btn.active { background: var(--charcoal); color: white; border-color: var(--charcoal); }
.error-msg { background: #fdf0f0; border: 1px solid #f5c2c2; color: var(--danger); padding: 10px 14px; border-radius: var(--radius-sm); font-size: .9rem; margin-bottom: 16px; display: none; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="logo">Pedidos<span>GT</span></a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Pedidos<span>GT</span></div>
    <div class="auth-subtitle">Tu marketplace local</div>
    <h2>Bienvenido de vuelta</h2>
    <p class="auth-subtitle" style="margin-bottom:20px">Ingresa a tu cuenta para continuar</p>

    <div class="role-toggle">
      <button class="role-btn active" onclick="setRole('cliente', this)">👤 Cliente</button>
      <button class="role-btn" onclick="setRole('negocio', this)">🏪 Negocio</button>
      <button class="role-btn" onclick="setRole('repartidor', this)">🛵 Repartidor</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="tucorreo@ejemplo.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-primary" style="width:100%;justify-content:center;padding:14px" onclick="doLogin()" id="loginBtn">
      Iniciar Sesión
    </button>

    <div class="auth-footer" style="margin-top:24px">
      ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
    </div>
    <div class="auth-footer">
      <a href="/">← Volver al directorio</a>
    </div>
  </div>
</div>

<script>
const API = '/api';
let selectedRole = 'cliente';

function setRole(role, btn) {
  selectedRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const errEl    = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  if (!email || !password) { showError('Completa todos los campos'); return; }

  btn.textContent = 'Ingresando...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!data.success) { showError(data.message || 'Credenciales incorrectas'); return; }

    // Store token
    localStorage.setItem('pedidos_token', data.data.token);
    localStorage.setItem('pedidos_user', JSON.stringify(data.data.user));

    // Redirect by role
    const role = data.data.user.role;
    if (role === 'admin')       window.location.href = '/admin/index.html';
    else if (role === 'negocio') window.location.href = '/negocio/index.html';
    else if (role === 'repartidor') window.location.href = '/repartidor/index.html';
    else                         window.location.href = '/cliente/index.html';

  } catch(e) {
    showError('Error de conexión. Intenta de nuevo.');
  } finally {
    btn.textContent = 'Iniciar Sesión';
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

// Allow Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
