<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — NuevaExpress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f4f4f0;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
.wrap{max-width:460px}
.code{font-family:'Syne',sans-serif;font-size:6rem;font-weight:800;color:#1a1a1a;line-height:1}
.code span{color:#ff4d2e}
h2{font-family:'Syne',sans-serif;font-size:1.5rem;margin:16px 0 8px}
p{color:#6b6b6b;margin-bottom:28px}
a{display:inline-block;background:#ff4d2e;color:white;padding:12px 28px;border-radius:10px;font-weight:600;text-decoration:none}
a:hover{background:#e03a1e}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">4<span>0</span>4</div>
  <h2>Página no encontrada</h2>
  <p>La página que buscas no existe o fue movida.</p>
  <a href="/">Volver al inicio</a>
</div>
</body>
</html>
