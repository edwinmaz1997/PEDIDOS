<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4A90D9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NuevaExpress">
<link rel="apple-touch-icon" href="/assets/img/logo.jpg">
<link rel="icon" type="image/jpeg" href="/assets/img/logo.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes — Admin NuevaExpress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<button class="mobile-menu-btn no-print" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay no-print" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="dashboard-layout">
  <aside class="sidebar no-print">
    <div class="sidebar-logo">
      <div class="logo"><img src="/assets/img/logo.jpg" alt="NuevaExpress"><span class="logo-text">Nueva<span>Express</span></span></div>
      <div style="color:rgba(255,255,255,.4);font-size:.75rem;margin-top:4px">Administrador</div>
    </div>
    <ul class="sidebar-nav">
      <li><a href="index.html">📊 Dashboard</a></li>
      <li><a href="negocios.html">🏪 Negocios</a></li>
      <li><a href="usuarios.html">👥 Usuarios</a></li>
      <li><a href="pedidos.html">📋 Pedidos</a></li>
      <li><a href="categorias.html">🏷️ Categorías</a></li>
      <li><a href="zonas-entrega.html">🗺️ Zonas de Entrega</a></li>
      <li><a href="buscar.html">🔍 Buscador</a></li>
      <li><a href="reportes.html" class="active">📊 Reportes</a></li>
      <li><a href="#" onclick="doLogout()">🚪 Salir</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <!-- Print header (only visible on print) -->
    <div style="display:none" id="printHeader">
      <div style="text-align:center;margin-bottom:24px;border-bottom:2px solid #000;padding-bottom:16px">
        <h1 style="font-size:1.8rem;margin-bottom:4px">NuevaExpress</h1>
        <p style="color:#666">Reporte Mensual de Cobros</p>
        <p id="printPeriod" style="font-weight:700"></p>
        <p style="font-size:.85rem;color:#888">Generado el <span id="printDate"></span></p>
      </div>
    </div>

    <div class="report-header no-print">
      <div class="page-header" style="margin:0"><h1>📊 Reportes Mensuales</h1><p>Cobros por negocio y período</p></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <select id="monthSel" onchange="loadReport()" style="padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;background:white"></select>
        <select id="yearSel" onchange="loadReport()" style="padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;background:white"></select>
        <select id="bizFilter" onchange="loadReport()" style="padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;background:white;max-width:200px">
          <option value="">Todos los negocios</option>
        </select>
        <button class="btn-ghost no-print" onclick="window.print()" style="padding:9px 16px">🖨️ Imprimir</button>
      </div>
    </div>

    <div id="loadingState" class="loading-state" style="margin-top:20px"><div class="spinner"></div></div>
    <div id="reportContent" style="display:none">

      <!-- Summary -->
      <div class="report-summary" id="reportSummary"></div>

      <!-- Per business -->
      <div id="bizReports"></div>
    </div>
  </main>
</div>

<script src="../assets/js/app.js"></script>
<script>
(function() {
  var hash = window.location.hash;
  if (hash && hash.indexOf('tk=') !== -1) {
    var parts = hash.substring(1).split('&');
    var tk='',us='';
    parts.forEach(function(p){ if(p.indexOf('tk=')===0)tk=p.substring(3); if(p.indexOf('us=')===0)us=decodeURIComponent(p.substring(3)); });
    if(tk){ localStorage.setItem('nuevaexpress_token',tk); if(us)localStorage.setItem('nuevaexpress_user',us); history.replaceState(null,'',window.location.pathname); }
  }
})();
var adminUser = JSON.parse(localStorage.getItem('nuevaexpress_user')||'{}');
if(!localStorage.getItem('nuevaexpress_token')||adminUser.role!=='admin') window.location.href='/cliente/login.html';
function getToken(){ return localStorage.getItem('nuevaexpress_token'); }

var allOrders = [];
var allBizMap = {};
var months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

async function init() {
  // Populate month/year selectors
  var now = new Date();
  var monthSel = document.getElementById('monthSel');
  var yearSel  = document.getElementById('yearSel');

  months.forEach(function(m, i) {
    var opt = document.createElement('option');
    opt.value = i+1; opt.textContent = m;
    if (i === now.getMonth()) opt.selected = true;
    monthSel.appendChild(opt);
  });

  for (var y = now.getFullYear(); y >= 2024; y--) {
    var opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if (y === now.getFullYear()) opt.selected = true;
    yearSel.appendChild(opt);
  }

  // Load data
  var [ordersRes, bizsRes] = await Promise.all([
    fetch('/api/admin/orders', {headers:{'Authorization':'Bearer '+getToken()}}).then(r=>r.json()),
    fetch('/api/admin/businesses', {headers:{'Authorization':'Bearer '+getToken()}}).then(r=>r.json()),
  ]);

  allOrders = ordersRes.data || [];
  var bizFilter = document.getElementById('bizFilter');
  (bizsRes.data||[]).forEach(function(b) {
    allBizMap[b.id] = b;
    var opt = document.createElement('option');
    opt.value = b.id; opt.textContent = b.name;
    bizFilter.appendChild(opt);
  });

  // Check URL for specific business
  var urlBiz = new URLSearchParams(window.location.search).get('negocio');
  if (urlBiz) bizFilter.value = urlBiz;

  loadReport();
}

function loadReport() {
  var month   = parseInt(document.getElementById('monthSel').value);
  var year    = parseInt(document.getElementById('yearSel').value);
  var bizId   = document.getElementById('bizFilter').value;
  var monthName = months[month-1];

  document.getElementById('printPeriod').textContent = monthName + ' ' + year;
  document.getElementById('printDate').textContent   = new Date().toLocaleDateString('es-GT');

  // Filter orders by month/year and status
  var filtered = allOrders.filter(function(o) {
    var d = new Date(o.created_at);
    var matchPeriod = d.getMonth()+1 === month && d.getFullYear() === year;
    var matchBiz    = !bizId || o.business_id == bizId;
    var notCanceled = o.status !== 'cancelado';
    return matchPeriod && matchBiz && notCanceled;
  });

  // Group by business
  var grouped = {};
  filtered.forEach(function(o) {
    if (!grouped[o.business_id]) grouped[o.business_id] = { name: o.business_name, orders: [] };
    grouped[o.business_id].orders.push(o);
  });

  // Summary totals
  var totalOrders    = filtered.length;
  var totalRevenue   = filtered.reduce(function(s,o){ return s + parseFloat(o.total||0); }, 0);
  var totalServiceFee= filtered.reduce(function(s,o){ return s + parseFloat(o.service_fee||0); }, 0);
  var totalDelivery  = filtered.reduce(function(s,o){ return s + parseFloat(o.delivery_fee||0); }, 0);

  // Render summary
  document.getElementById('reportSummary').innerHTML = `
    <h3>Resumen — ${monthName} ${year}</h3>
    <div class="report-summary-grid">
      <div class="report-summary-item"><div class="label">Pedidos procesados</div><div class="value">${totalOrders}</div></div>
      <div class="report-summary-item"><div class="label">Negocios activos</div><div class="value">${Object.keys(grouped).length}</div></div>
      <div class="report-summary-item"><div class="label">Tarifas de servicio</div><div class="value">Q${totalServiceFee.toFixed(2)}</div></div>
      <div class="report-summary-item"><div class="label">Tarifas de delivery</div><div class="value">Q${totalDelivery.toFixed(2)}</div></div>
      <div class="report-summary-item"><div class="label">Volumen total</div><div class="value">Q${totalRevenue.toFixed(2)}</div></div>
    </div>`;

  // Render per business
  var bizHtml = '';
  if (!Object.keys(grouped).length) {
    bizHtml = '<div class="empty-state"><p>Sin pedidos en este período</p></div>';
  } else {
    bizHtml = Object.entries(grouped).map(function(entry) {
      var bid = entry[0]; var data = entry[1];
      var orders = data.orders;
      var bizTotal     = orders.reduce(function(s,o){ return s + parseFloat(o.total||0); }, 0);
      var bizService   = orders.reduce(function(s,o){ return s + parseFloat(o.service_fee||0); }, 0);
      var bizDelivery  = orders.reduce(function(s,o){ return s + parseFloat(o.delivery_fee||0); }, 0);
      var bizSubtotal  = orders.reduce(function(s,o){ return s + parseFloat(o.subtotal||0); }, 0);
      var deliveryCount= orders.filter(function(o){ return o.delivery_type==='delivery'; }).length;
      var whatsappMsg  = encodeURIComponent(
        '🧾 *Reporte NuevaExpress — ' + monthName + ' ' + year + '*\n' +
        '📌 Negocio: *' + data.name + '*\n\n' +
        '📦 Total de pedidos: ' + orders.length + '\n' +
        '🛵 Con delivery: ' + deliveryCount + '\n\n' +
        '💰 *Detalle de cobros:*\n' +
        '• Tarifas de servicio (Q3 × ' + orders.length + ' pedidos): Q' + bizService.toFixed(2) + '\n' +
        '\n_Nota: Las tarifas de delivery (Q' + bizDelivery.toFixed(2) + ') corresponden a los repartidores._\n' +
        '\n✅ *Total a cobrar a NuevaExpress: Q' + bizService.toFixed(2) + '*\n\n' +
        'Generado por NuevaExpress\nnuevaexpress.com'
      );

      var orderRows = orders.map(function(o) {
        var d = new Date(o.created_at);
        return '<div class="report-order-row">' +
          '<span style="font-weight:600">' + esc(o.order_number) + '</span>' +
          '<span style="color:var(--muted)">' + d.toLocaleDateString('es-GT') + '</span>' +
          '<span>' + esc(o.client_name) + '</span>' +
          '<div style="text-align:right">' +
            '<div style="font-weight:600">Q' + parseFloat(o.total).toFixed(2) + '</div>' +
            '<div style="font-size:.75rem;color:var(--success)">+Q' + parseFloat(o.service_fee).toFixed(2) + ' svc' + (parseFloat(o.delivery_fee)>0?' +Q'+parseFloat(o.delivery_fee).toFixed(2)+' del':'') + '</div>' +
          '</div>' +
        '</div>';
      }).join('');

      return `
        <div class="report-biz-card">
          <div class="report-biz-header" onclick="toggleOrders('biz-${bid}')">
            <div>
              <div class="report-biz-name">🏪 ${esc(data.name)}</div>
              <div style="font-size:.82rem;color:var(--muted);margin-top:3px">${orders.length} pedido${orders.length!==1?'s':''} · ${deliveryCount} con delivery</div>
            </div>
            <div style="text-align:right">
              <div class="report-biz-total">Cobrar: Q${bizService.toFixed(2)}</div>
              <div style="font-size:.78rem;color:var(--muted)">Volumen: Q${bizTotal.toFixed(2)}</div>
            </div>
          </div>

          <div style="background:var(--off-white);border-radius:var(--radius-sm);padding:12px;margin:8px 0;display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px">
            <div><div style="font-size:.72rem;color:var(--muted);text-transform:uppercase">Subtotal ventas</div><div style="font-weight:700">Q${bizSubtotal.toFixed(2)}</div></div>
            <div><div style="font-size:.72rem;color:var(--muted);text-transform:uppercase">Tarifas servicio (Q3×peds)</div><div style="font-weight:700;color:var(--success)">Q${bizService.toFixed(2)}</div></div>
            <div><div style="font-size:.72rem;color:var(--muted);text-transform:uppercase">Delivery (repartidores)</div><div style="font-weight:700;color:var(--muted)">Q${bizDelivery.toFixed(2)}</div></div>
            <div style="background:var(--blue);border-radius:var(--radius-sm);padding:8px;color:white"><div style="font-size:.72rem;opacity:.8;text-transform:uppercase">A COBRAR (NuevaExpress)</div><div style="font-weight:700;font-size:1.1rem">Q${bizService.toFixed(2)}</div></div>
          </div>

          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px" class="no-print">
            <a href="https://wa.me/?text=${whatsappMsg}" target="_blank" class="btn-primary" style="padding:8px 16px;font-size:.85rem;background:linear-gradient(135deg,#25d366,#128c7e)">💬 Enviar por WhatsApp</a>
            <button onclick="printBiz('${esc(data.name)}','${monthName} ${year}','${bid}')" class="btn-ghost" style="padding:8px 16px;font-size:.85rem">🖨️ Imprimir</button>
          </div>

          <div class="report-orders-list" id="biz-${bid}">
            <div style="display:grid;grid-template-columns:1fr auto auto auto;gap:10px;padding:6px 0;font-size:.75rem;font-weight:700;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)">
              <span>#Pedido</span><span>Fecha</span><span>Cliente</span><span style="text-align:right">Monto</span>
            </div>
            ${orderRows}
          </div>
          <button onclick="toggleOrders('biz-${bid}')" class="btn-ghost no-print" style="padding:6px 14px;font-size:.82rem;margin-top:8px;width:100%">Ver detalle de pedidos ▾</button>
        </div>`;
    }).join('');
  }

  document.getElementById('bizReports').innerHTML = bizHtml;
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('reportContent').style.display = 'block';
  document.getElementById('printHeader').style.display = 'none'; // shown by CSS on print
}

function toggleOrders(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function printBiz(name, period, bizId) {
  // Open all orders for this biz and print
  var el = document.getElementById('biz-' + bizId);
  if (el) el.classList.add('open');
  document.getElementById('printPeriod').textContent = period;
  document.getElementById('printDate').textContent = new Date().toLocaleDateString('es-GT');
  window.print();
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function doLogout(){ localStorage.clear(); window.location.href='/cliente/login.html'; }
function toggleSidebar(){ var s=document.querySelector('.sidebar');var o=document.getElementById('sidebarOverlay');if(s)s.classList.toggle('open');if(o)o.classList.toggle('open'); }

init();
</script>
<script>var e=document.getElementById("yr");if(e)e.textContent=new Date().getFullYear();</script>
<script src="/assets/js/pwa.js"></script>
</body>
</html>
