<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4A90D9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NuevaExpress">
<link rel="apple-touch-icon" href="/assets/img/logo.jpg">
<link rel="icon" type="image/jpeg" href="/assets/img/logo.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos — Admin NuevaExpress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/main.css">
<style>
.filter-bar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.filter-bar input,.filter-bar select { padding:9px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-family:'DM Sans',sans-serif; font-size:.9rem; outline:none; background:white; }
.filter-bar input { flex:1; min-width:180px; }
.filter-bar input:focus,.filter-bar select:focus { border-color:var(--accent); }
.revenue-bar { display:flex; gap:16px; background:var(--charcoal); border-radius:var(--radius); padding:20px 24px; margin-bottom:24px; flex-wrap:wrap; }
.rev-item { flex:1; min-width:120px; }
.rev-label { font-size:.75rem; color:rgba(255,255,255,.5); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
.rev-value { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:700; color:white; }
</style>
</head>
<body>
<button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo"><img src="/assets/img/logo.jpg" alt="NuevaExpress"><span class="logo-text">Nueva<span>Express</span></span></div>
      <div style="color:rgba(255,255,255,.4);font-size:.75rem;margin-top:4px">Administrador</div>
    </div>
    <ul class="sidebar-nav">
      <li><a href="index.html">📊 Dashboard</a></li>
      <li><a href="negocios.html">🏪 Negocios</a></li>
      <li><a href="usuarios.html">👥 Usuarios</a></li>
      <li><a href="pedidos.html" class="active">📋 Pedidos</a></li>
      <li><a href="#" onclick="APP.logout()">🚪 Salir</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="page-header"><h1>Todos los Pedidos</h1><p>Vista completa del sistema</p></div>

    <div class="revenue-bar" id="revenueBar">
      <div class="rev-item"><div class="rev-label">Total pedidos</div><div class="rev-value" id="rTotal">—</div></div>
      <div class="rev-item"><div class="rev-label">Ingresos tarifas (Q)</div><div class="rev-value" id="rRevenue">—</div></div>
      <div class="rev-item"><div class="rev-label">Deliveries</div><div class="rev-value" id="rDeliveries">—</div></div>
      <div class="rev-item"><div class="rev-label">Pendientes</div><div class="rev-value" id="rPending" style="color:#ffb703">—</div></div>
    </div>

    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Buscar por # pedido, cliente, negocio..." oninput="filterTable()">
      <select id="statusFilter" onchange="filterTable()">
        <option value="">Todos los estados</option>
        <option value="pendiente">⏳ Pendiente</option>
        <option value="aceptado">✅ Aceptado</option>
        <option value="en_preparacion">👨‍🍳 En preparación</option>
        <option value="listo">📦 Listo</option>
        <option value="en_camino">🛵 En camino</option>
        <option value="entregado">✔ Entregado</option>
        <option value="cancelado">✕ Cancelado</option>
      </select>
      <select id="typeFilter" onchange="filterTable()">
        <option value="">Todos los tipos</option>
        <option value="pickup">🏃 Recoger</option>
        <option value="delivery">🛵 Delivery</option>
      </select>
    </div>

    <div style="overflow-x:auto">
      <div class="table-responsive"><table class="data-table">
        <thead>
          <tr><th>#</th><th>Cliente</th><th>Negocio</th><th>Tipo</th><th>Subtotal</th><th>Tarifa</th><th>Delivery</th><th>Total</th><th>Estado</th><th>Fecha</th></tr>
        </thead>
        <tbody id="ordersBody"><tr><td colspan="10" style="text-align:center;padding:24px;color:var(--muted)">Cargando...</td></tr></tbody>
      </table></div>
    </div>
  </main>
</div>

<script src="../assets/js/app.js"></script>
<script>
  // Recover token from URL hash if localStorage is empty
  (function() {
    var hash = window.location.hash;
    if (hash && hash.indexOf('tk=') !== -1) {
      var parts = hash.substring(1).split('&');
      var tk = '', us = '';
      parts.forEach(function(p) {
        if (p.indexOf('tk=') === 0) tk = p.substring(3);
        if (p.indexOf('us=') === 0) us = decodeURIComponent(p.substring(3));
      });
      if (tk) {
        localStorage.setItem('nuevaexpress_token', tk);
        if (us) localStorage.setItem('nuevaexpress_user', us);
        // Clean URL
        history.replaceState(null, '', window.location.pathname);
      }
    }
  })();

var adminUser  = JSON.parse(localStorage.getItem('nuevaexpress_user') || '{}');
if (!localStorage.getItem('nuevaexpress_token') || adminUser.role !== 'admin') { window.location.href = '/cliente/login.html'; }
let allOrders = [];

async function init() {
  const res = await APP.get('/admin/orders');
  allOrders = res?.data || [];

  // Compute revenue summary
  const active = allOrders.filter(o => o.status !== 'cancelado');
  const totalRevenue = active.reduce((s, o) => s + parseFloat(o.service_fee||0), 0);
  const totalDelivery = active.filter(o => o.delivery_type === 'delivery').reduce((s,o) => s + parseFloat(o.delivery_fee||0), 0);
  document.getElementById('rTotal').textContent = allOrders.length;
  document.getElementById('rRevenue').textContent = 'Q' + totalRevenue.toFixed(2);
  document.getElementById('rDeliveries').textContent = allOrders.filter(o=>o.delivery_type==='delivery').length;
  document.getElementById('rPending').textContent = allOrders.filter(o=>o.status==='pendiente').length;

  renderTable(allOrders);
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const type   = document.getElementById('typeFilter').value;
  const filtered = allOrders.filter(o => {
    const mQ = !q || (o.order_number||'').toLowerCase().includes(q) || (o.client_name||'').toLowerCase().includes(q) || (o.business_name||'').toLowerCase().includes(q);
    const mS = !status || o.status === status;
    const mT = !type || o.delivery_type === type;
    return mQ && mS && mT;
  });
  renderTable(filtered);
}

function renderTable(list) {
  const body = document.getElementById('ordersBody');
  if (!list.length) { body.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:24px;color:var(--muted)">Sin resultados</td></tr>'; return; }
  body.innerHTML = list.map(o => `
    <tr>
      <td style="font-size:.8rem;font-weight:700">${APP.esc(o.order_number)}</td>
      <td style="font-size:.85rem">${APP.esc(o.client_name)}</td>
      <td style="font-size:.85rem">${APP.esc(o.business_name)}</td>
      <td style="font-size:.8rem">${o.delivery_type==='delivery'?'🛵':'🏃'}</td>
      <td style="font-size:.85rem">${APP.money(o.subtotal)}</td>
      <td style="font-size:.85rem;color:var(--success)">+${APP.money(o.service_fee)}</td>
      <td style="font-size:.85rem">${parseFloat(o.delivery_fee)>0?APP.money(o.delivery_fee):'—'}</td>
      <td style="font-weight:700">${APP.money(o.total)}</td>
      <td><span class="badge ${APP.statusBadge[o.status]||''}">${APP.statusLabel[o.status]||o.status}</span></td>
      <td style="font-size:.78rem;color:var(--muted)">${APP.date(o.created_at)}</td>
    </tr>
  `).join('');
}

init();
setInterval(init, 30000);
</script>

<script>
function toggleSidebar() {
  var sidebar = document.querySelector('.sidebar');
  var overlay = document.getElementById('sidebarOverlay');
  if (sidebar) sidebar.classList.toggle('open');
  if (overlay) overlay.classList.toggle('open');
}
</script>

<script src="/assets/js/pwa.js"></script>
</body>
</html>
