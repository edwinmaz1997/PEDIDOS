<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4A90D9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NuevaExpress">
<link rel="apple-touch-icon" href="/assets/img/logo.jpg">
<link rel="icon" type="image/jpeg" href="/assets/img/logo.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Negocios — Admin NuevaExpress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/main.css">
<style>
.biz-table-row { display:flex; flex-wrap:wrap; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--border); transition:var(--transition); }
.biz-table-row:hover { background:var(--off-white); }
.biz-table-row:last-child { border-bottom:none; }
.biz-featured { background:#fff8e1;border:1.5px solid #ffe082; }
.biz-avatar { width:48px; height:48px; border-radius:10px; object-fit:cover; background:var(--off-white); display:flex; align-items:center; justify-content:center; font-size:1.3rem; overflow:hidden; flex-shrink:0; }
.biz-avatar img { width:100%; height:100%; object-fit:cover; }
.biz-info { flex:1; min-width:160px; }
.biz-info-name { font-weight:600; font-size:.95rem; }
.biz-info-sub { font-size:.8rem; color:var(--muted); margin-top:2px; }
.biz-badges { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.biz-order-btns { display:flex; gap:4px; align-items:center; }
.action-group { display:flex; gap:6px; flex-wrap:wrap; }
.icon-btn { background:none; border:1px solid var(--border); border-radius:6px; padding:6px 10px; cursor:pointer; font-size:.82rem; transition:var(--transition); }
.icon-btn:hover { background:var(--off-white); }
.icon-btn.success:hover { background:#d4edda; border-color:var(--success); }
.icon-btn.danger:hover { background:#fdf0f0; border-color:var(--danger); color:var(--danger); }
@media(max-width:600px){
  .biz-table-row { padding:12px; }
  .action-group { width:100%; }
}
.filter-bar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.filter-bar input { padding:9px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-family:'DM Sans',sans-serif; font-size:.9rem; flex:1; min-width:200px; outline:none; }
.filter-bar input:focus { border-color:var(--accent); }
.filter-bar select { padding:9px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-family:'DM Sans',sans-serif; font-size:.9rem; outline:none; background:white; }
</style>
</head>
<body>
<button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo"><img src="/assets/img/logo.jpg" alt="NuevaExpress"><span class="logo-text">Nueva<span>Express</span></span></div>
      <div style="color:rgba(255,255,255,.4);font-size:.75rem;margin-top:4px">Administrador</div>
    </div>
    <ul class="sidebar-nav">
      <li><a href="index.html">📊 Dashboard</a></li>
      <li><a href="negocios.html" class="active">🏪 Negocios</a></li>
      <li><a href="usuarios.html">👥 Usuarios</a></li>
      <li><a href="pedidos.html">📋 Pedidos</a></li>
      <li><a href="#" onclick="APP.logout()">🚪 Salir</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div class="page-header" style="margin:0"><h1>Negocios</h1><p>Gestión del directorio</p></div>
      <span class="badge badge-accepted" id="totalBadge"></span>
      <a href="nuevo-negocio.html" class="btn-primary">+ Agregar negocio</a>
    </div>

    <div class="filter-bar">
      <input type="text" id="searchQ" placeholder="🔍 Buscar negocio, dueño, ciudad..." oninput="applyFilters()">
      <select id="catFilter" onchange="applyFilters()">
        <option value="">Todas las categorías</option>
      </select>
      <select id="statusFilter" onchange="applyFilters()">
        <option value="">Todos los estados</option>
        <option value="pending">⏳ Pendientes aprobación</option>
        <option value="1">✅ Activos</option>
        <option value="0">⏸ Inactivos</option>
      </select>
      <span id="filterCount" style="font-size:.82rem;color:var(--muted)"></span>
    </div>

    <div style="background:white;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden">
      <div style="display:grid;grid-template-columns:56px 1fr auto auto auto;gap:12px;padding:10px 16px;background:var(--off-white);border-bottom:1px solid var(--border)">
        <div></div>
        <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;color:var(--muted)">Negocio</div>
        <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;color:var(--muted)">Estado</div>
        <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;color:var(--muted)">Delivery</div>
        <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;color:var(--muted)">Acciones</div>
      </div>
      <div id="bizList"><div class="loading-state"><div class="spinner"></div></div></div>
    </div>
  </main>
</div>
    <div class="pagination" id="pagination"></div>

<script src="../assets/js/app.js"></script>
<script>
  // Recover token from URL hash if localStorage is empty
  (function() {
    var hash = window.location.hash;
    if (hash && hash.indexOf('tk=') !== -1) {
      var parts = hash.substring(1).split('&');
      var tk = '', us = '';
      parts.forEach(function(p) {
        if (p.indexOf('tk=') === 0) tk = p.substring(3);
        if (p.indexOf('us=') === 0) us = decodeURIComponent(p.substring(3));
      });
      if (tk) {
        localStorage.setItem('nuevaexpress_token', tk);
        if (us) localStorage.setItem('nuevaexpress_user', us);
        // Clean URL
        history.replaceState(null, '', window.location.pathname);
      }
    }
  })();

var adminUser  = JSON.parse(localStorage.getItem('nuevaexpress_user') || '{}');
if (!localStorage.getItem('nuevaexpress_token') || adminUser.role !== 'admin') { window.location.href = '/cliente/login.html'; }
var allBiz = [];
var filtered = [];
var page = 1;
var perPage = 12;
var cats = [];

function applyFilters() {
  var qEl = document.getElementById('searchQ') || document.getElementById('searchInput');
  var q   = qEl ? qEl.value.toLowerCase() : '';
  var catEl = document.getElementById('catFilter');
  var stEl  = document.getElementById('statusFilter');
  var cat = catEl ? catEl.value : '';
  var st  = stEl  ? stEl.value  : '';
  filtered = allBiz.filter(function(b) {
    var mQ = !q || (b.name||'').toLowerCase().includes(q) || (b.owner_name||'').toLowerCase().includes(q) || (b.city||'').toLowerCase().includes(q);
    var mC = !cat || String(b.category_id) === cat;
    var mS = st==='' ||
             (st==='pending' && !b.is_active && !b.is_verified) ||
             (st==='1' && b.is_active) ||
             (st==='0' && !b.is_active && b.is_verified);
    return mQ && mC && mS;
  });
  page = 1;
  var fc = document.getElementById('filterCount');
  if (fc) fc.textContent = filtered.length + ' negocios';
  renderPagination(filtered.length);
  renderTable(filtered.slice((page-1)*perPage, page*perPage));
}

function renderPagination(total) {
  var pages = Math.ceil(total/perPage);
  ['pagination','paginationTop'].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    if (pages <= 1) { el.innerHTML=''; return; }
    var html = '<button class="page-btn" onclick="goPage('+(page-1)+')" '+(page===1?'disabled':'')+'>‹</button>';
    for (var i=1;i<=pages;i++) {
      if (i===1||i===pages||(i>=page-2&&i<=page+2)) html+='<button class="page-btn '+(i===page?'active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
      else if (i===page-3||i===page+3) html+='<span class="page-info">…</span>';
    }
    html += '<button class="page-btn" onclick="goPage('+(page+1)+')" '+(page===pages?'disabled':'')+'>›</button>';
    html += '<span class="page-info">'+total+' negocios</span>';
    el.innerHTML = html;
  });
}
function goPage(p){var pages=Math.ceil(filtered.length/perPage);if(p<1||p>pages)return;page=p;renderTable(filtered.slice((page-1)*perPage, page*perPage));window.scrollTo(0,0);}

async function init() {
  const [bizRes, catRes] = await Promise.all([APP.get('/admin/businesses'), APP.get('/categories')]);
  allBiz = bizRes?.data || [];
  document.getElementById('totalBadge').textContent = allBiz.length + ' negocios';

  const catSel = document.getElementById('catFilter');
  (catRes.data||[]).forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = c.name;
    catSel.appendChild(opt);
  });
  filtered = allBiz.slice(); applyFilters();
}

function filterTable() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const cat    = document.getElementById('catFilter').value;
  const status = document.getElementById('statusFilter').value;
  const filtered = allBiz.filter(b => {
    const matchQ = !q || b.name.toLowerCase().includes(q) || (b.owner_name||'').toLowerCase().includes(q);
    const matchC = !cat || b.category_id == cat;
    const matchS = status === '' || b.is_active == status;
    return matchQ && matchC && matchS;
  });
  renderTable(filtered);
}

function renderTable(list) {
  const container = document.getElementById('bizGrid') || document.getElementById('bizList');
  if (!list.length) { container.innerHTML = '<div class="empty-state"><p>Sin resultados</p></div>'; return; }
  container.innerHTML = list.map((b, idx) => `
    <div class="biz-table-row ${b.is_featured ? 'biz-featured' : ''}">
      <div class="biz-avatar">
        ${b.logo ? `<img src="${APP.esc(b.logo)}" alt="">` : '🏪'}
      </div>
      <div class="biz-info">
        <div class="biz-info-name">
          ${b.is_featured ? '<span title="Destacado">⭐ </span>' : ''}${APP.esc(b.name)}
        </div>
        <div class="biz-info-sub">${APP.esc(b.category_name)} · ${APP.esc(b.owner_name)}</div>
        ${b.city ? `<div class="biz-info-sub">📍 ${APP.esc(b.city)}${b.zone?', '+APP.esc(b.zone):''}</div>` : ''}
      </div>
      <div class="biz-badges">
        <span class="badge ${b.is_active?'badge-done':'badge-cancel'}">${b.is_active?'Activo':'Inactivo'}</span>
        ${b.accepts_delivery ? '<span class="badge badge-delivery">🛵</span>' : ''}
      </div>
      <div class="biz-order-btns">
        <button onclick="moveUp(${b.id}, ${b.sort_order||0})" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:.8rem">▲</button>
        <input type="number" value="${b.sort_order||0}" onchange="setOrder(${b.id}, this.value)" style="width:42px;text-align:center;font-size:.78rem;padding:4px 2px;border:1px solid var(--border);border-radius:6px">
        <button onclick="moveDown(${b.id}, ${b.sort_order||0})" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:.8rem">▼</button>
      </div>
      <div class="action-group">
        <button class="icon-btn" onclick="toggleFeatured(${b.id}, ${b.is_featured})" title="${b.is_featured?'Quitar destacado':'Destacar'}" style="${b.is_featured?'background:#fff8e1;border-color:#ffe082;':''}">
          ${b.is_featured?'⭐':'☆'}
        </button>
        <button class="icon-btn" onclick="editBiz(${b.id})" title="Editar">✏️</button>
        <button class="icon-btn" onclick="viewBiz(${b.id})" title="Ver">👁</button>
        <button class="icon-btn" onclick="connectAsBiz(${b.user_id})" title="Conectar como negocio" style="background:#e0f2fe;border-color:#7dd3fc;font-size:.75rem;padding:4px 8px;width:auto;border-radius:6px">🔗 Conectar</button>
        <button class="icon-btn ${b.is_verified?'':'success'}" onclick="toggleVerify(${b.id}, ${b.is_verified})">
          ${b.is_verified?'✓':'✓'}
        </button>
        <button class="icon-btn ${b.is_active?'danger':''}" onclick="toggleActive(${b.id}, ${b.is_active})">
          ${b.is_active?'⏸':'▶'}
        </button>
        <button class="icon-btn danger" onclick="deleteBiz(${b.id}, '${b.name.replace(/'/g,'')}')">🗑️</button>
      </div>
    </div>
  `).join('');
}
async function toggleActive(id, current) {
  const res = await APP.put(`/businesses/${id}`, { is_active: current ? 0 : 1 });
  if (res?.success) { APP.toast(current ? 'Negocio desactivado' : 'Negocio activado'); init(); }
  else APP.toast('Error', 'error');
}

async function toggleFeatured(id, current) {
  const res = await APP.put(`/businesses/${id}`, { is_featured: current ? 0 : 1 });
  if (res?.success) { APP.toast(current ? 'Destacado removido' : '⭐ Negocio marcado como destacado'); init(); }
  else APP.toast('Error', 'error');
}

async function setOrder(id, value) {
  const newOrder = parseInt(value) || 0;
  const res = await APP.put(`/businesses/${id}`, { sort_order: newOrder });
  if (res?.success) { APP.toast('Posición actualizada'); init(); }
  else APP.toast('Error', 'error');
}

async function moveUp(id, currentOrder) {
  var prev = allBiz.filter(function(b){ return (b.sort_order||0) < currentOrder; });
  if (!prev.length) return;
  var target = prev.reduce(function(a,b){ return (a.sort_order||0) > (b.sort_order||0) ? a : b; });
  await APP.put('/businesses/' + id, { sort_order: target.sort_order||0 });
  await APP.put('/businesses/' + target.id, { sort_order: currentOrder });
  init();
}

async function moveDown(id, currentOrder) {
  var next = allBiz.filter(function(b){ return (b.sort_order||0) > currentOrder; });
  if (!next.length) return;
  var target = next.reduce(function(a,b){ return (a.sort_order||0) < (b.sort_order||0) ? a : b; });
  await APP.put('/businesses/' + id, { sort_order: target.sort_order||0 });
  await APP.put('/businesses/' + target.id, { sort_order: currentOrder });
  init();
}

async function toggleVerify(id, current) {
  const res = await APP.put(`/businesses/${id}`, { is_verified: current ? 0 : 1 });
  if (res?.success) { APP.toast(current ? 'Verificación removida' : 'Negocio verificado ⭐'); init(); }
  else APP.toast('Error', 'error');
}

function editBiz(id) { window.location.href = 'editar-negocio.html?id=' + id; }
function viewBiz(id) { window.open('/negocio.html?id=' + id, '_blank'); }

async function connectAsBiz(userId) {
  if (!confirm('¿Iniciar sesión como este negocio? Se abrirá en una nueva pestaña.')) return;
  var res = await fetch('/api/admin/impersonate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + localStorage.getItem('nuevaexpress_token') },
    body: JSON.stringify({ user_id: userId })
  });
  var data = await res.json();
  if (!data.success) { alert('Error: ' + (data.message || 'No se pudo conectar')); return; }
  var token = data.data.token;
  var user  = encodeURIComponent(JSON.stringify(data.data.user));
  window.open('/negocio/index.html#tk=' + token + '&us=' + user, '_blank');
}

async function deleteBiz(id, name) {
  if (!confirm('¿Eliminar "' + name + '"? Esta acción no se puede deshacer.')) return;
  var res = await fetch('/api/businesses/' + id, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('nuevaexpress_token') }
  }).then(function(r){ return r.json(); });
  if (res.success) { APP.toast('Negocio eliminado'); init(); }
  else APP.toast(res.message || 'Error al eliminar', 'error');
}

init();
</script>

<script>
function toggleSidebar() {
  var sidebar = document.querySelector('.sidebar');
  var overlay = document.getElementById('sidebarOverlay');
  if (sidebar) sidebar.classList.toggle('open');
  if (overlay) overlay.classList.toggle('open');
}
</script>

<script src="/assets/js/pwa.js"></script>
</body>
</html>
